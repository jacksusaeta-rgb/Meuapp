<style>
:root{
  --bg:#0a0a0a;
  --panel:#141414;
  --panel-2:#1a1a1a;
  --border:#2a2416;
  --text:#f5f0e8;
  --muted:#a09070;
  --muted-2:#6b5a3e;
  --gold:#d4a843;
  --gold-light:#f0c866;
  --gold-dark:#a07828;
  --white:#ffffff;
  --danger:#e05050;
  --danger-bg:rgba(224,80,80,0.12);
  --online:#50d090;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{
  background:linear-gradient(160deg,#0a0a0a 0%,#141008 50%,#0a0a0a 100%);
  font-family:'Inter',system-ui,sans-serif;
  color:var(--text);
  -webkit-tap-highlight-color:transparent;
  min-height:100vh;
}
button{font-family:inherit;cursor:pointer;}
.mono{font-family:'JetBrains Mono',monospace;}
.hidden,.hidden-input{display:none!important;}
#root{height:100vh;width:100%;display:flex;justify-content:center;}

/* ---- shell ---- */
.shell{
  position:relative;width:100%;max-width:480px;height:100vh;
  background:linear-gradient(180deg,#0d0d0d 0%,#0a0905 100%);
  display:flex;flex-direction:column;overflow:hidden;
  border-left:1px solid #2a2010;border-right:1px solid #2a2010;
}
.header{
  display:flex;align-items:center;gap:12px;padding:14px 16px 12px;padding-right:62px;
  border-bottom:1px solid #2a2010;flex-shrink:0;
  background:linear-gradient(180deg,#111008 0%,#0d0d0b 100%);
}
.content{flex:1;overflow-y:auto;padding:16px;padding-bottom:108px;-webkit-overflow-scrolling:touch;}

/* ---- nav buttons ---- */
.nav-btn{
  position:absolute;z-index:30;width:44px;height:44px;border-radius:50%;border:none;
  display:flex;align-items:center;justify-content:center;box-shadow:0 4px 14px rgba(0,0,0,0.6);
}
.nav-btn.next{
  top:12px;right:12px;
  background:linear-gradient(135deg,var(--gold-light),var(--gold-dark));
  color:#1a0e00;
}
.nav-btn.prev{
  bottom:12px;left:12px;
  background:linear-gradient(135deg,#1e1a10,#14120a);
  color:var(--gold);border:1px solid #3a3020;
}
.nav-btn:active{transform:scale(0.93);}

/* ---- avatar ---- */
.avatar-wrap{position:relative;flex-shrink:0;}
.avatar-img{width:100%;height:100%;border-radius:50%;object-fit:cover;border:1.5px solid var(--gold-dark);display:block;}
.avatar-fallback{
  width:100%;height:100%;border-radius:50%;
  background:linear-gradient(135deg,#1e1a10,#2a2010);
  border:1.5px solid var(--gold-dark);
  display:flex;align-items:center;justify-content:center;color:var(--gold);font-weight:700;
}
.avatar-dot{position:absolute;bottom:-1px;right:-1px;width:11px;height:11px;border-radius:50%;border:2px solid var(--bg);}
.avatar-dot.on{background:var(--online);}
.avatar-dot.off{background:var(--muted-2);}
.avatar-pick{background:none;border:none;padding:0;}

/* ---- ip readout ---- */
.ip-readout{
  display:inline-flex;gap:5px;padding:9px 13px;
  background:#050402;border:1px solid #3a2e10;border-radius:10px;
  box-shadow:inset 0 1px 6px rgba(0,0,0,0.7),0 0 12px rgba(212,168,67,0.08);
}
.ip-readout.compact{gap:2px;padding:4px 8px;}
.ip-digit{font-family:'JetBrains Mono',monospace;color:var(--gold-light);font-weight:700;font-size:22px;text-shadow:0 0 10px rgba(212,168,67,0.7);}
.ip-readout.compact .ip-digit{font-size:12px;text-shadow:none;}

/* ---- form elements ---- */
.input{
  width:100%;background:#111008;border:1px solid #3a2e10;border-radius:12px;
  padding:11px 14px;color:var(--text);font-size:15px;outline:none;
}
.input:focus{border-color:var(--gold);}
.input.center{text-align:center;letter-spacing:4px;}
.textarea{
  width:100%;background:#0d0c08;border:1px solid #3a2e10;border-radius:10px;
  padding:10px;color:var(--text);resize:none;outline:none;font-family:inherit;font-size:14px;
}
.textarea:focus{border-color:var(--gold);}

/* ---- buttons ---- */
.btn{border:none;border-radius:12px;padding:11px 16px;font-weight:600;font-size:14px;}
.btn-primary{background:linear-gradient(135deg,var(--gold-light),var(--gold-dark));color:#1a0e00;}
.btn-ghost{background:transparent;color:var(--muted);padding:8px 12px;}
.btn-danger{background:var(--danger);color:white;}
.btn-sm{padding:7px 12px;font-size:13px;}
.icon-btn{background:none;border:none;color:var(--muted);padding:8px;border-radius:50%;display:flex;align-items:center;justify-content:center;}
.icon-btn.gold{color:var(--gold);}
.icon-btn.danger:active{color:var(--danger);}
.full-btn{
  display:flex;align-items:center;justify-content:center;gap:8px;width:100%;
  background:#111008;border:1px solid #3a2e10;color:var(--text);border-radius:12px;padding:12px;font-size:14px;
}
.full-btn.danger-btn{background:var(--danger-bg);border-color:rgba(224,80,80,0.3);color:#f08080;}

/* ---- layout utils ---- */
.flex-1{flex:1;}.min-w0{min-width:0;}.truncate{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.row-between{display:flex;align-items:center;justify-content:space-between;gap:8px;}
.row-gap{display:flex;gap:8px;}.row-gap-4{display:flex;gap:16px;}.align-center{align-items:center;}
.row-end{display:flex;justify-content:flex-end;gap:8px;margin-top:10px;}
.stack-2>*+*{margin-top:8px;}.stack-4>*+*{margin-top:16px;}.stack-5>*+*{margin-top:20px;}
.stack-6>*+*{margin-top:24px;}.stack-7>*+*{margin-top:28px;}
.name{font-weight:600;font-size:15px;}.sub{font-size:12px;color:var(--muted);margin-top:2px;}
.time-xs{font-size:11px;color:var(--muted-2);flex-shrink:0;margin-left:8px;}
.muted-xs{font-size:12px;color:var(--muted);margin-bottom:6px;}
.label{font-size:13px;font-weight:600;margin-bottom:8px;}
.label.danger{color:var(--danger);}
.empty{font-size:14px;color:var(--muted-2);}
.empty.center{text-align:center;margin-top:40px;}
.note{font-size:12px;color:var(--muted-2);margin-top:8px;line-height:1.5;}
.dot-sep{color:var(--muted-2);}
.gold{color:var(--gold);}
.tab-label{font-size:11px;color:var(--muted);}

/* ---- card ---- */
.card{
  background:linear-gradient(135deg,#161208,#111008);
  border:1px solid #3a2e10;border-radius:16px;padding:16px;
}
.list-row{
  display:flex;align-items:center;gap:12px;
  background:rgba(20,18,8,0.7);border:1px solid #2a2010;border-radius:14px;padding:12px;
}

/* ---- tab dots ---- */
.tab-dots{display:flex;gap:4px;flex-shrink:0;}
.tab-dot{width:28px;height:28px;border-radius:50%;border:none;background:none;color:var(--muted-2);display:flex;align-items:center;justify-content:center;}
.tab-dot.active{background:linear-gradient(135deg,var(--gold-light),var(--gold-dark));color:#1a0e00;}

/* ---- status ---- */
.status-buttons{display:flex;gap:6px;flex-wrap:wrap;}
.status-type-btn{flex:1;min-width:70px;padding:10px;border-radius:12px;border:1px solid #3a2e10;background:#111008;color:var(--muted);font-size:12px;font-weight:600;}
.status-type-btn.active{background:linear-gradient(135deg,var(--gold-light),var(--gold-dark));color:#1a0e00;border-color:transparent;}
.composer-card{background:rgba(20,18,8,0.8);border:1px solid #3a2e10;border-radius:14px;padding:12px;}
.status-card{background:rgba(20,18,8,0.6);border:1px solid #2a2010;border-radius:18px;overflow:hidden;}
.status-card-head{display:flex;align-items:center;gap:10px;padding:12px 14px 8px;}
.status-card-body{padding:0 14px 14px;}
.status-img{width:100%;max-height:320px;object-fit:cover;display:block;}
.status-caption{font-size:13px;color:var(--muted);margin-top:8px;}
.status-music-label{display:flex;align-items:center;gap:6px;color:var(--gold);font-size:13px;font-weight:600;margin-bottom:6px;}
.status-text-content{white-space:pre-wrap;word-break:break-word;font-size:15px;line-height:1.5;}

/* ---- messages ---- */
.messages-list{display:flex;flex-direction:column;gap:8px;}
.day-sep{display:flex;justify-content:center;margin:8px 0;}
.day-sep span{font-size:11px;color:var(--muted);background:#111008;border:1px solid #2a2010;padding:3px 12px;border-radius:99px;}
.msg-row{display:flex;align-items:flex-end;gap:6px;}
.msg-row.mine{justify-content:flex-end;flex-direction:row-reverse;}
.msg-row.theirs{justify-content:flex-start;}
.bubble{max-width:78%;border-radius:18px;overflow:hidden;}
.bubble-mine{background:linear-gradient(135deg,#c49030,#9a6c18);color:#fff8ec;border-bottom-right-radius:5px;}
.bubble-theirs{background:#1a1810;border:1px solid #2a2010;color:var(--text);border-bottom-left-radius:5px;}
.bubble-inner{padding:8px 12px;}
.msg-text{white-space:pre-wrap;word-break:break-word;font-size:14px;}
.msg-media{max-width:100%;max-height:280px;border-radius:12px;display:block;object-fit:cover;cursor:pointer;}
.msg-file{display:flex;align-items:center;gap:6px;font-size:13px;text-decoration:underline dotted;color:inherit;}
.msg-time-row{display:flex;align-items:center;justify-content:flex-end;gap:4px;margin-top:3px;}
.msg-time{font-size:10px;opacity:0.65;}
.ticks{font-size:11px;}
.ticks.read{color:#60d0a0;}
.sticker{font-size:46px;line-height:1;display:block;padding:4px 0;}
.reply-preview{background:rgba(0,0,0,0.25);border-left:3px solid var(--gold);border-radius:6px;padding:5px 8px;margin-bottom:6px;font-size:12px;color:var(--muted);cursor:pointer;}
.mention{color:var(--gold);font-weight:600;}
.msg-del{background:none;border:none;color:var(--muted-2);opacity:0.5;flex-shrink:0;}
.msg-del:active{opacity:1;color:var(--danger);}
.msg-actions{display:flex;gap:2px;flex-direction:column;justify-content:flex-end;}
.reactions-row{display:flex;flex-wrap:wrap;gap:3px;margin-top:4px;padding:0 4px 4px;}
.reaction-badge{background:#1e1c10;border:1px solid #3a2e10;border-radius:99px;padding:2px 7px;font-size:13px;cursor:pointer;}
.reaction-badge.mine{border-color:var(--gold-dark);}

/* ---- reaction picker ---- */
.reaction-picker{
  position:absolute;bottom:calc(100% + 6px);right:0;
  background:#1a1810;border:1px solid #3a2e10;border-radius:14px;padding:8px;
  display:flex;gap:6px;z-index:50;box-shadow:0 8px 24px rgba(0,0,0,0.6);
}
.reaction-opt{font-size:22px;background:none;border:none;cursor:pointer;}

/* ---- composer ---- */
#composer-wrap{flex-shrink:0;}
.composer{background:#0d0d0b;border-top:1px solid #2a2010;padding:10px 12px 10px 64px;}
.sticker-panel{display:grid;grid-template-columns:repeat(6,1fr);gap:6px;background:#111008;border:1px solid #2a2010;border-radius:14px;padding:10px;margin-bottom:8px;}
.sticker-pick{background:none;border:none;font-size:22px;cursor:pointer;}
.reply-bar{display:flex;align-items:center;gap:8px;background:#111008;border:1px solid #2a2010;border-radius:10px;padding:6px 10px;margin-bottom:6px;font-size:12px;color:var(--muted);}
.composer-row{display:flex;align-items:center;gap:4px;}
.msg-input{
  flex:1;min-width:0;background:#111008;border:1px solid #2a2010;border-radius:22px;
  padding:9px 14px;color:var(--text);font-size:14px;outline:none;resize:none;
  max-height:120px;overflow-y:auto;font-family:inherit;
}
.msg-input:focus{border-color:var(--gold-dark);}
.send-btn{
  background:linear-gradient(135deg,var(--gold-light),var(--gold-dark));
  color:#1a0e00;border:none;border-radius:50%;width:40px;height:40px;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
#mic-btn.recording{color:var(--danger);background:rgba(224,80,80,0.12);border-radius:50%;}

/* ---- groups ---- */
.group-badge{font-size:10px;background:#1e1808;border:1px solid #3a2e10;color:var(--gold);padding:2px 7px;border-radius:99px;display:inline-flex;align-items:center;gap:3px;}

/* ---- toggle ---- */
.toggle-btn{display:flex;align-items:center;gap:6px;font-size:12px;padding:7px 12px;border-radius:10px;border:none;}
.toggle-btn.on{background:rgba(212,168,67,0.15);color:var(--gold-light);}
.toggle-btn.off{background:#111008;color:var(--muted);}

/* ---- lightbox ---- */
.lightbox{position:fixed;inset:0;background:rgba(0,0,0,0.97);z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;}
.lightbox img,.lightbox video{max-width:100%;max-height:85vh;object-fit:contain;border-radius:8px;}
.lightbox-close{position:fixed;top:14px;right:14px;background:rgba(255,255,255,0.15);border:none;color:white;width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;z-index:1000;cursor:pointer;}

/* ---- modal ---- */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:60;display:flex;align-items:flex-end;justify-content:center;}
.modal-box{background:#111008;border:1px solid #3a2e10;border-radius:20px 20px 0 0;padding:20px;width:100%;max-width:480px;max-height:80vh;overflow-y:auto;}
.modal-title{font-weight:700;font-size:16px;margin-bottom:12px;color:var(--gold);}

/* ---- toast / dialog ---- */
#toast-wrap{position:absolute;top:0;left:0;right:0;display:flex;justify-content:center;pointer-events:none;z-index:40;}
.toast{margin-top:12px;background:#1a1808;border:1px solid #3a2e10;padding:9px 18px;border-radius:99px;font-size:13px;box-shadow:0 8px 20px rgba(0,0,0,0.5);max-width:82%;text-align:center;pointer-events:auto;color:var(--text);}
.dialog-overlay{position:absolute;inset:0;background:rgba(0,0,0,0.85);display:flex;align-items:center;justify-content:center;padding:24px;z-index:50;}
.dialog-box{background:#111008;border:1px solid #3a2e10;border-radius:18px;padding:20px;width:100%;max-width:320px;}
.dialog-title{font-weight:700;margin-bottom:4px;}
.dialog-msg{font-size:13px;color:var(--muted);margin-bottom:16px;}
.dialog-actions{display:flex;justify-content:flex-end;gap:8px;}

/* ---- onboarding ---- */
.onboarding{height:100vh;width:100%;max-width:420px;margin:0 auto;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center;}
.onb-logo{font-size:42px;font-weight:700;background:linear-gradient(135deg,#ffffff,var(--gold-light),var(--gold-dark));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:-1px;margin-bottom:4px;}
.eyebrow{color:var(--gold);font-size:11px;letter-spacing:2px;text-transform:uppercase;margin-bottom:20px;}
.onb-input{max-width:280px;margin-bottom:14px;text-align:center;}
.onb-ip-row{display:flex;gap:8px;max-width:280px;width:100%;margin-bottom:6px;}
.onb-submit{width:100%;max-width:280px;margin-top:14px;padding:14px;}
.onb-note{font-size:12px;color:var(--muted-2);max-width:280px;margin-top:14px;line-height:1.5;}
.spin{animation:spin 1s linear infinite;display:inline-block;}
@keyframes spin{to{transform:rotate(360deg);}}

/* ---- polls ---- */
.poll-option{background:#0d0c08;border:1px solid #3a2e10;border-radius:10px;padding:10px 12px;margin-bottom:6px;cursor:pointer;position:relative;overflow:hidden;}
.poll-bar{position:absolute;left:0;top:0;bottom:0;background:rgba(212,168,67,0.15);transition:width 0.4s;}
.poll-label{position:relative;font-size:13px;}
.poll-pct{position:absolute;right:10px;top:50%;transform:translateY(-50%);font-size:11px;color:var(--gold);}

/* ---- disappearing msg badge ---- */
.temp-badge{font-size:10px;color:var(--gold);background:rgba(212,168,67,0.1);border:1px solid #3a2e10;border-radius:99px;padding:2px 8px;display:inline-flex;align-items:center;gap:3px;}

/* ---- broadcast ---- */
.broadcast-badge{background:rgba(212,168,67,0.08);border:1px solid #3a2010;border-radius:10px;padding:10px 12px;font-size:12px;color:var(--muted);}
</style>
</head>

<div id="root"><div style="height:100vh;display:flex;align-items:center;justify-content:center;color:#d4a843"><span class="spin">⟳</span></div></div>
<script>
'use strict';

/* ============================================================
   SUPABASE
============================================================ */
const SUPABASE_URL="https://iziobxzrhhlnqvfehuho.supabase.co";
const SUPABASE_KEY="sb_publishable_X5xisyNyAcftcSZ7x0S7Mg_w_V0mdvW";

async function dbGet(key,shared){
  if(!shared){try{const r=localStorage.getItem("l:"+key);return r?JSON.parse(r):null;}catch{return null;}}
  try{
    const r=await fetch(`${SUPABASE_URL}/rest/v1/app_data?key=eq.${encodeURIComponent(key)}&select=value`,
      {headers:{apikey:SUPABASE_KEY,Authorization:`Bearer ${SUPABASE_KEY}`}});
    if(!r.ok)return null;
    const rows=await r.json();
    return rows.length?JSON.parse(rows[0].value):null;
  }catch{return null;}
}
async function dbSet(key,value,shared){
  if(!shared){try{localStorage.setItem("l:"+key,JSON.stringify(value));return true;}catch{return false;}}
  try{
    const r=await fetch(`${SUPABASE_URL}/rest/v1/app_data`,{
      method:"POST",
      headers:{apikey:SUPABASE_KEY,Authorization:`Bearer ${SUPABASE_KEY}`,"Content-Type":"application/json",Prefer:"resolution=merge-duplicates"},
      body:JSON.stringify({key,value:JSON.stringify(value)})
    });
    return r.ok;
  }catch{return false;}
}
async function dbDel(key,shared){
  if(!shared){try{localStorage.removeItem("l:"+key);}catch{}return;}
  try{await fetch(`${SUPABASE_URL}/rest/v1/app_data?key=eq.${encodeURIComponent(key)}`,
    {method:"DELETE",headers:{apikey:SUPABASE_KEY,Authorization:`Bearer ${SUPABASE_KEY}`}});}catch{}
}

/* ============================================================
   STATE
============================================================ */
const S={
  identity:null,tabIndex:0,directory:{},contacts:[],hidden:[],blocked:[],
  activeChat:null,activeChatIsGroup:false,
  messages:[],statusFeed:[],convPreviews:{},groups:{},
  notifPerm:(typeof Notification!=="undefined")?Notification.permission:"unsupported",
  recording:false,mediaRecorder:null,chunks:[],lastCounts:{},
  statusComposerType:null,lightbox:null,replyTo:null,
  onboardingAvatar:null,settingsAvatar:undefined,
  disappearing:false,
};
const TABS=[
  {id:"add",label:"Adicionar",icon:"users"},
  {id:"status",label:"Status",icon:"image"},
  {id:"conversations",label:"Conversas",icon:"messageCircle"},
  {id:"settings",label:"Configurações",icon:"settings"},
];
const STICKERS=["😀","😂","😍","🥳","😎","🥺","👍","🙏","🔥","❤️","🎉","😴","🤝","💪","🎵","🌟"];
const REACTIONS=["❤️","😂","👍","😮","😢","🙏"];
const root=document.getElementById("root");
let heartTimer=null,dirTimer=null,chatTimer=null,toastTimer=null,currentDialogOK=null;

/* ============================================================
   HELPERS
============================================================ */
function esc(s){return String(s??"").replace(/[&<>"']/g,(c)=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function genId(){return Date.now()+"-"+Math.random().toString(36).slice(2);}
function genIp(){return String(Math.floor(100000+Math.random()*900000));}
function isValidIp(v){return /^[0-9]{6}$/.test(v);}
function convKey(a,b){return[a,b].sort().join("_");}
function fmtClock(ts){return new Date(ts).toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"});}
function fmtDay(ts){
  const d=new Date(ts),t=new Date(),y=new Date();y.setDate(t.getDate()-1);
  if(d.toDateString()===t.toDateString())return"Hoje";
  if(d.toDateString()===y.toDateString())return"Ontem";
  return d.toLocaleDateString("pt-BR",{day:"2-digit",month:"2-digit",year:"numeric"});
}
function lastSeenLabel(ls){
  if(!ls)return"Offline";
  const d=Date.now()-ls;
  if(d<30000)return"Online";
  const m=Math.floor(d/60000);
  if(m<1)return"Visto agora";if(m<60)return`Visto há ${m} min`;
  const h=Math.floor(m/60);if(h<24)return`Visto há ${h} h`;
  return`Visto há ${Math.floor(h/24)} d`;
}
function isOnline(ls){return!!ls&&Date.now()-ls<30000;}
function resizeImg(file,maxW,q){
  return new Promise((res,rej)=>{
    const reader=new FileReader();
    reader.onload=e=>{
      const img=new Image();
      img.onload=()=>{
        let w=img.width,h=img.height;
        if(w>maxW){h=Math.round(h*maxW/w);w=maxW;}
        const c=document.createElement("canvas");c.width=w;c.height=h;
        c.getContext("2d").drawImage(img,0,0,w,h);
        res(c.toDataURL("image/jpeg",q));
      };
      img.onerror=rej;img.src=e.target.result;
    };
    reader.onerror=rej;reader.readAsDataURL(file);
  });
}
function fileToDataURL(file){
  return new Promise((res,rej)=>{
    const r=new FileReader();r.onload=e=>res(e.target.result);r.onerror=rej;r.readAsDataURL(file);
  });
}
function showToast(msg){
  const w=document.getElementById("toast-wrap");if(!w)return;
  w.innerHTML=`<div class="toast">${esc(msg)}</div>`;
  clearTimeout(toastTimer);toastTimer=setTimeout(()=>{w.innerHTML="";},2800);
}

}

function avatarHTML(name,src,px,online){
  px=px||40;
  const ini=esc((name||"?").trim().charAt(0).toUpperCase());
  const dot=online===undefined?"":`<span class="avatar-dot ${online?"on":"off"}"></span>`;
  const inner=src?`<img src="${src}" alt="" class="avatar-img"/>`:
    `<div class="avatar-fallback" style="font-size:${Math.round(px*0.42)}px">${ini}</div>`;
  return `<div class="avatar-wrap" style="width:${px}px;height:${px}px">${inner}${dot}</div>`;
}
function ipReadoutHTML(ip,compact){
  const digits=(ip||"------").split("");
  return `<div class="ip-readout ${compact?"compact":""}">${digits.map(d=>`<span class="ip-digit">${esc(d)}</span>`).join("")}</div>`;
}

function navNext(){if(S.activeChat){closeChat();return;}setTab((S.tabIndex+1)%TABS.length);}
function navPrev(){if(S.activeChat){closeChat();return;}setTab((S.tabIndex-1+TABS.length)%TABS.length);}
function setTab(i){
  S.tabIndex=i;
  renderHeader();renderContent();
  onEnterTab(TABS[i].id);
}
async function onEnterTab(id){
  if(id==="add"){const dir=await dbGet("directory",true);if(dir){S.directory=dir;renderContent();}}
  else if(id==="status"){await loadStatusFeed();renderContent();}
  else if(id==="conversations"){await loadConvPreviews();renderContent();}
}

function screenConversations(){
  const sorted=[...S.contacts,...Object.keys(S.groups)].sort((a,b)=>{
    const la=(S.convPreviews[a]&&S.convPreviews[a].timestamp)||0;
    const lb=(S.convPreviews[b]&&S.convPreviews[b].timestamp)||0;
    return lb-la;
  });
  const uniq=[...new Set(sorted)];
  if(uniq.length===0)return`<p class="empty">Nenhuma conversa ainda.</p>`;
  return`<div class="stack-2">${uniq.map(id=>convRowHTML(id,!!S.groups[id])).join("")}</div>`;
}

function convRowHTML(id,isGrp){
  const p=isGrp?(S.groups[id]||{}):(S.directory[id]||{});
  const last=S.convPreviews[id];
  const onl=isGrp?null:isOnline(p.lastSeen);
  return`<div class="list-row">
    ${avatarHTML(p.name||p.username||id,p.avatar,44,onl)}
    <div class="flex-1 min-w0" data-action="${isGrp?"open-group-chat":"open-chat"}" data-ip="${id}" style="cursor:pointer">

/* ============================================================
   MESSAGES HTML
============================================================ */
function buildMsgsHTML(){
  if(!S.messages.length)return`<p class="empty center">Nenhuma mensagem ainda. Envie a primeira!</p>`;
  let html="",lastDay=null;
  S.messages.forEach(m=>{
    const day=fmtDay(m.timestamp);
    if(day!==lastDay){html+=`<div class="day-sep"><span>${day}</span></div>`;lastDay=day;}
    const mine=m.sender===S.identity.ip;
    const readByAll=m.readBy&&Object.keys(m.readBy).length>0;
    const tickHtml=mine?`<span class="ticks ${readByAll?"read":""}">${icon(readByAll?"doubleCheck":"check",12)}</span>`:"";
    const deletedBySender=m.deletedBySender;
    const edited=m.edited;
    const reactionsHtml=m.reactions&&Object.keys(m.reactions).length?
      `<div class="reactions-row">${Object.entries(m.reactions).map(([emoji,users])=>
        `<button class="reaction-badge ${users.includes(S.identity.ip)?"mine":""}" data-action="react-msg" data-id="${m.id}" data-emoji="${emoji}">${emoji} ${users.length}</button>`
      ).join("")}</div>`:"";
    const replyHtml=m.replyTo?`<div class="reply-preview" data-action="scroll-to-msg" data-id="${m.replyTo.id}">${icon("reply",12)} <strong>${esc(m.replyTo.senderName)}</strong>: ${esc((m.replyTo.content||"").slice(0,60))}</div>`:"";
    let bodyHtml=deletedBySender?`<span style="font-style:italic;opacity:0.6">🚫 Mensagem apagada</span>`:msgContentHTML(m);
    html+=`<div class="msg-row ${mine?"mine":"theirs"}" data-msgid="${m.id}">
      ${mine?`<div class="msg-actions">
        ${!deletedBySender?`<button class="icon-btn" style="padding:4px" data-action="show-msg-menu" data-id="${m.id}">${icon("settings",14)}</button>`:""}
        <button class="msg-del" data-action="delete-message" data-id="${m.id}">${icon("trash",13)}</button>
      </div>`:""}
      <div class="bubble ${mine?"bubble-mine":"bubble-theirs"}">
        ${!mine&&S.activeChatIsGroup?`<p style="font-size:11px;color:var(--gold);padding:6px 12px 0;font-weight:600">${esc((S.directory[m.sender]||{}).username||m.sender)}</p>`:""}
        <div class="bubble-inner">
          ${replyHtml}
          ${bodyHtml}
          <div class="msg-time-row">
            ${edited?`<span style="font-size:9px;opacity:0.6">editado</span>`:""}
            ${m.disappears?`<span class="ticks">${icon("clock",10)}</span>`:""}
            <span class="msg-time">${fmtClock(m.timestamp)}</span>
            ${tickHtml}
          </div>
        </div>
        ${reactionsHtml}
      </div>
      ${!mine?`<button class="icon-btn" style="padding:4px" data-action="show-msg-menu" data-id="${m.id}">${icon("smile",14)}</button>`:""}
    </div>`;
  });
  return html;
}

function msgContentHTML(m){
  switch(m.type){
    case"image":return`<button data-action="preview-media" data-src="${m.content}" data-type="image" style="background:none;border:none;padding:0;cursor:pointer;display:block;"><img class="msg-media" src="${m.content}" alt="foto"/></button>`;
    case"video":return`<video class="msg-media" src="${m.content}" controls></video>`;
    case"audio":return`<audio src="${m.content}" controls style="max-width:220px"></audio>`;
    case"file":return`<a class="msg-file" href="${m.content}" download="${esc(m.fileName||"arquivo")}">${icon("file",15)} ${esc(m.fileName||"arquivo")}</a>`;
    case"sticker":return`<span class="sticker">${m.content}</span>`;
    case"poll":return pollHTML(m);
    default:return`<span class="msg-text">${esc(m.content)}</span>`;
  }
}

function pollHTML(m){
  const poll=m.poll||{};
  const total=Object.values(poll.votes||{}).reduce((a,v)=>a+v.length,0);
  const voted=Object.values(poll.votes||{}).some(v=>v.includes(S.identity.ip));
  return`<div>
    <p style="font-weight:600;font-size:13px;margin-bottom:8px">${icon("poll",13)} ${esc(poll.question)}</p>
    ${(poll.options||[]).map((opt,i)=>{
      const voters=(poll.votes&&poll.votes[i])||[];
      const pct=total?Math.round(voters.length/total*100):0;
      return`<div class="poll-option ${voted?"":""}${voters.includes(S.identity.ip)?" reaction-badge mine":""}" data-action="vote-poll" data-msgid="${m.id}" data-opt="${i}">
        <div class="poll-bar" style="width:${pct}%"></div>
        <span class="poll-label">${esc(opt)}</span>
        ${voted?`<span class="poll-pct">${pct}%</span>`:""}
      </div>`;
    }).join("")}
    <p style="font-size:11px;color:var(--muted);margin-top:4px">${total} voto${total!==1?"s":""}</p>
  </div>`;
}

async function openChat(ip){
  if(S.blocked.includes(ip))return showToast("Você bloqueou esse contato.");
  S.activeChat=ip;S.activeChatIsGroup=false;S.replyTo=null;
  const key="conv:"+convKey(S.identity.ip,ip);
  const arr=(await dbGet(key,true))||[];
  S.messages=arr;S.lastCounts[key]=arr.length;
  const cfg=(await dbGet("chatcfg:"+convKey(S.identity.ip,ip),false))||{};
  S.disappearing=!!cfg.disappearing;
  markRead(ip);
  renderHeader();renderContent();
  document.getElementById("composer-wrap").innerHTML=buildComposerHTML();
  scrollBottom();

  S.activeChat=null;S.activeChatIsGroup=false;S.messages=[];S.replyTo=null;

  document.getElementById("composer-wrap").innerHTML="";
}

async function markRead(ip){
  if(!ip)return;
  const key="conv:"+convKey(S.identity.ip,ip);
  const arr=(await dbGet(key,true))||[];
  let changed=false;
  arr.forEach(m=>{if(m.sender!==S.identity.ip&&(!m.readBy||!m.readBy[S.identity.ip])){
    m.readBy=m.readBy||{};m.readBy[S.identity.ip]=Date.now();changed=true;}});
  if(changed)await dbSet(key,arr,true);
}

async function sendMessage(type,content,extras){
  if(!S.activeChat)return;
  const isGrp=S.activeChatIsGroup;
  const key="conv:"+(isGrp?S.activeChat:convKey(S.identity.ip,S.activeChat));
  const arr=(await dbGet(key,true))||[];
  const msg={
    id:genId(),sender:S.identity.ip,type,content,
    fileName:extras?.fileName||null,timestamp:Date.now(),
    replyTo:S.replyTo||null,
    disappears:S.disappearing,
    readBy:{},reactions:{},
    ...(extras?.poll?{poll:extras.poll}:{}),
  };
  if(S.replyTo){
    const parent=S.messages.find(m=>m.id===S.replyTo.id);
    msg.replyTo={id:S.replyTo.id,senderName:(S.directory[S.replyTo.sender]||{}).username||S.replyTo.sender,content:S.replyTo.content||""};
    S.replyTo=null;
    const rb=document.getElementById("reply-bar-wrap");if(rb)rb.innerHTML="";
  }
  arr.push(msg);
  const ok=await dbSet(key,arr,true);
  if(!ok)return showToast("Falha ao enviar. Arquivo muito grande ou armazenamento cheio.");
  S.lastCounts[key]=arr.length;S.messages=arr;
  renderContent();scrollBottom();
  if(S.disappearing){
    setTimeout(async()=>{
      const cur=(await dbGet(key,true))||[];
      const filtered=cur.filter(m=>m.id!==msg.id);
      await dbSet(key,filtered,true);
      if(S.activeChat&&(isGrp?S.activeChat===S.activeChat:convKey(S.identity.ip,S.activeChat)===key.slice(5))){
        S.messages=filtered;renderContent();
      }
    },30000);
  }
}

function sendTextFromInput(){
  const input=document.getElementById("chat-text-input");
  const val=(input?.value||"").trim();if(!val)return;
  input.value="";input.style.height="";

function deleteMessage(id){
  showDialog({title:"Apagar mensagem",message:"Apagar para todos?",onConfirm:async()=>{
    const isGrp=S.activeChatIsGroup;
    const key="conv:"+(isGrp?S.activeChat:convKey(S.identity.ip,S.activeChat));
    const arr=(await dbGet(key,true))||[];
    const m=arr.find(x=>x.id===id);
    if(m&&m.sender===S.identity.ip){m.deletedBySender=true;m.content="";m.type="text";}
    await dbSet(key,arr,true);S.messages=arr;hideDialog();renderContent();
  }});
}

async function reactToMsg(msgId,emoji){
  const isGrp=S.activeChatIsGroup;
  const key="conv:"+(isGrp?S.activeChat:convKey(S.identity.ip,S.activeChat));
  const arr=(await dbGet(key,true))||[];
  const m=arr.find(x=>x.id===msgId);if(!m)return;
  m.reactions=m.reactions||{};
  m.reactions[emoji]=m.reactions[emoji]||[];
  const idx=m.reactions[emoji].indexOf(S.identity.ip);
  if(idx>-1)m.reactions[emoji].splice(idx,1);else m.reactions[emoji].push(S.identity.ip);
  if(!m.reactions[emoji].length)delete m.reactions[emoji];
  await dbSet(key,arr,true);S.messages=arr;closeModal();renderContent();
}

async function editMsg(msgId){
  const msg=S.messages.find(m=>m.id===msgId);if(!msg)return;
  const newText=prompt("Editar mensagem:",msg.content);
  if(!newText||newText===msg.content)return;
  const isGrp=S.activeChatIsGroup;
  const key="conv:"+(isGrp?S.activeChat:convKey(S.identity.ip,S.activeChat));
  const arr=(await dbGet(key,true))||[];
  const m=arr.find(x=>x.id===msgId);if(!m)return;
  m.content=newText;m.edited=true;
  await dbSet(key,arr,true);S.messages=arr;closeModal();renderContent();
}

async function votePoll(msgId,optIdx){
  const isGrp=S.activeChatIsGroup;
  const key="conv:"+(isGrp?S.activeChat:convKey(S.identity.ip,S.activeChat));
  const arr=(await dbGet(key,true))||[];
  const m=arr.find(x=>x.id===msgId);if(!m||!m.poll)return;
  m.poll.votes=m.poll.votes||{};
  Object.keys(m.poll.votes).forEach(k=>{
    m.poll.votes[k]=m.poll.votes[k].filter(ip=>ip!==S.identity.ip);
  });
  m.poll.votes[optIdx]=m.poll.votes[optIdx]||[];
  m.poll.votes[optIdx].push(S.identity.ip);
  await dbSet(key,arr,true);S.messages=arr;renderContent();
}

async function doForward(msgId,targetId){
  const msg=S.messages.find(m=>m.id===msgId);if(!msg)return;
  const isGrp=!!S.groups[targetId];
  const key="conv:"+(isGrp?targetId:convKey(S.identity.ip,targetId));
  const arr=(await dbGet(key,true))||[];
  arr.push({...msg,id:genId(),sender:S.identity.ip,timestamp:Date.now(),replyTo:null,reactions:{},readBy:{},forwarded:true});
  await dbSet(key,arr,true);
  closeModal();showToast("Mensagem encaminhada!");
}

function setReplyTo(msgId){
  const msg=S.messages.find(m=>m.id===msgId);if(!msg)return;
  S.replyTo={id:msg.id,sender:msg.sender,content:msg.type==="text"?msg.content:`[${msg.type}]`};
  const rb=document.getElementById("reply-bar-wrap");
  const senderName=(S.directory[msg.sender]||{}).username||msg.sender;
  if(rb)rb.innerHTML=`<div class="reply-bar">${icon("reply",13)} <strong>${esc(senderName)}</strong>: ${esc((S.replyTo.content).slice(0,60))}
    <button class="icon-btn" style="margin-left:auto;padding:2px" data-action="cancel-reply">${icon("x",14)}</button></div>`;
  document.getElementById("chat-text-input")?.focus();
  closeModal();
}

function deleteConversation(ip){
  showDialog({title:"Excluir conversa",message:"Todo o histórico será apagado.",onConfirm:async()=>{
    const isGrp=!!S.groups[ip];
    const key="conv:"+(isGrp?ip:convKey(S.identity.ip,ip));
    await dbDel(key,true);
    if(S.activeChat===ip){S.activeChat=null;S.messages=[];document.getElementById("composer-wrap").innerHTML="";}
    hideDialog();closeModal();
    if(TABS[S.tabIndex].id==="conversations")await loadConvPreviews();
    renderHeader();renderContent();showToast("Conversa excluída.");
  }});
}

async function toggleDisappearing(){
  S.disappearing=!S.disappearing;
  const key="chatcfg:"+convKey(S.identity.ip,S.activeChat);
  await dbSet(key,{disappearing:S.disappearing},false);
  closeModal();renderHeader();
  showToast(S.disappearing?"Mensagens temporárias ligadas (30s).":"Mensagens temporárias desligadas.");
}

/* ============================================================
   ACTIONS: STATUS
============================================================ */
async function loadStatusFeed(){
  const ips=[S.identity.ip,...S.contacts];const all=[];
  for(const ip of ips){const arr=(await dbGet("status:"+ip,true))||[];arr.forEach(s=>all.push({...s,owner:ip}));}
  all.sort((a,b)=>b.timestamp-a.timestamp);S.statusFeed=all;
}

function openStatusComposer(type){S.statusComposerType=S.statusComposerType===type?null:type;renderContent();}
function closeStatusComposer(){S.statusComposerType=null;renderContent();}

async function postStatus(type,content,extras){
  const key="status:"+S.identity.ip;
  const arr=(await dbGet(key,true))||[];
  const text=extras?.text||"";
  const mentions=[];
  const mentionPattern=/@(\d{6})/g;let m;
  while((m=mentionPattern.exec(text))!==null){if(S.contacts.includes(m[1])||m[1]===S.identity.ip)mentions.push(m[1]);}
  arr.push({id:genId(),type,content,caption:extras?.caption||"",music:extras?.music||null,mentions,timestamp:Date.now()});
  const ok=await dbSet(key,arr,true);
  S.statusComposerType=null;
  if(!ok)return showToast("Falha: arquivo muito grande.");
  showToast("Status publicado!");await loadStatusFeed();renderContent();
}

async function publishStatusText(){
  const ta=document.getElementById("status-text-input");const text=(ta?.value||"").trim();if(!text)return;
  const musicEl=document.getElementById("status-music-url");const music=(musicEl?.value||"").trim();
  await postStatus("text",text,{text,music:music||null});
}

async function onStatusPhotoSelected(file){
  try{const data=await resizeImg(file,900,0.75);await postStatus("image",data,{});}
  catch{showToast("Erro ao ler a imagem.");}
}
async function onStatusMusicSelected(file){
  try{
    const caption=(document.getElementById("status-music-caption")?.value||"").trim()||file.name;
    const data=await fileToDataURL(file);await postStatus("music",data,{caption});
  }catch{showToast("Erro ao ler o áudio.");}
}
async function onStatusTextMusicSelected(file){
  try{const data=await fileToDataURL(file);const el=document.getElementById("status-music-url");if(el)el.value=data;}
  catch{showToast("Erro ao ler o áudio.");}
}

function deleteStatus(id){
  showDialog({title:"Excluir status",message:"Essa publicação será removida.",onConfirm:async()=>{
    const key="status:"+S.identity.ip;
    const arr=((await dbGet(key,true))||[]).filter(s=>s.id!==id);
    await dbSet(key,arr,true);hideDialog();await loadStatusFeed();renderContent();showToast("Status excluído.");
  }});
}

async function toggleHidden(ip){
  S.hidden=S.hidden.includes(ip)?S.hidden.filter(h=>h!==ip):[...S.hidden,ip];
  await dbSet("myHidden",S.hidden,false);
}

/* ============================================================
   ACTIONS: CONVERSATIONS PREVIEW
============================================================ */
async function loadConvPreviews(){
  const all=[...S.contacts,...Object.keys(S.groups)];
  const next={};
  for(const id of all){
    const isGrp=!!S.groups[id];
    const key="conv:"+(isGrp?id:convKey(S.identity.ip,id));
    const arr=(await dbGet(key,true))||[];
    next[id]=arr.length?arr[arr.length-1]:null;
  }
  S.convPreviews=next;
}

/* ============================================================
   ACTIONS: SETTINGS
============================================================ */
async function onSettingsAvatarSelected(file){
  const data=await resizeImg(file,240,0.7);S.settingsAvatar=data;
  const prev=document.getElementById("settings-avatar-preview");
  const username=document.getElementById("settings-username-input")?.value||S.identity.username;
  if(prev)prev.innerHTML=avatarHTML(username,data,64);
}

async function saveProfile(){
  const username=(document.getElementById("settings-username-input")?.value||"").trim().slice(0,20)||S.identity.username;
  const avatarData=S.settingsAvatar!==undefined?S.settingsAvatar:S.identity.avatar;
  S.identity={...S.identity,username,avatar:avatarData};
  await dbSet("myIdentity",S.identity,false);
  const dir=(await dbGet("directory",true))||{};
  dir[S.identity.ip]={...(dir[S.identity.ip]||{}),username,avatar:avatarData,lastSeen:Date.now()};
  await dbSet("directory",dir,true);S.directory=dir;
  renderHeader();renderContent();showToast("Perfil atualizado!");
}

async function downloadBackup(){
  const convos={};
  for(const ip of S.contacts){const k=convKey(S.identity.ip,ip);convos[k]=(await dbGet("conv:"+k,true))||[];}
  const grpConvos={};
  for(const id of Object.keys(S.groups)){grpConvos[id]=(await dbGet("conv:"+id,true))||[];}
  const myStatuses=(await dbGet("status:"+S.identity.ip,true))||[];
  const payload={identity:S.identity,contacts:S.contacts,hidden:S.hidden,blocked:S.blocked,groups:S.groups,statuses:myStatuses,conversations:convos,groupConversations:grpConvos,exportedAt:Date.now()};
  const blob=new Blob([JSON.stringify(payload,null,2)],{type:"application/json"});
  const url=URL.createObjectURL(blob);const a=document.createElement("a");
  a.href=url;a.download=`backup-elocv-${S.identity.ip}.json`;a.click();URL.revokeObjectURL(url);
  showToast("Backup baixado.");
}

async function restoreBackup(file){
  try{
    const text=await file.text();const data=JSON.parse(text);
    if(data.contacts){S.contacts=data.contacts;await dbSet("myContacts",S.contacts,false);}
    if(data.hidden){S.hidden=data.hidden;await dbSet("myHidden",S.hidden,false);}
    if(data.blocked){S.blocked=data.blocked;await dbSet("myBlocked",S.blocked,false);}
    if(data.groups){S.groups=data.groups;await dbSet("myGroups",S.groups,false);}
    showToast("Backup restaurado.");renderContent();
  }catch{showToast("Arquivo inválido.");}
}

async function requestNotifications(){
  window.OneSignalDeferred=window.OneSignalDeferred||[];
  window.OneSignalDeferred.push(async function(OneSignal){
    try{
      await OneSignal.Notifications.requestPermission();
      const opted=OneSignal.User.PushSubscription.optedIn;
      S.notifPerm=opted?"granted":"denied";
      if(S.identity)await OneSignal.User.addTag("ip",S.identity.ip);
    }catch{S.notifPerm="denied";}
    renderContent();showToast(S.notifPerm==="granted"?"Notificações ativadas.":"Permissão não concedida.");
  });
}

function clearMyDataConfirm(){
  showDialog({title:"Apagar todos os dados",message:"Isso apaga seu perfil deste dispositivo. Irreversível.",confirmLabel:"Apagar",onConfirm:async()=>{
    await dbDel("myIdentity",false);await dbDel("myContacts",false);
    await dbDel("myHidden",false);await dbDel("myBlocked",false);await dbDel("myGroups",false);
    stopLiveLoops();
    Object.assign(S,{identity:null,contacts:[],hidden:[],blocked:[],groups:{},activeChat:null,messages:[],statusFeed:[],convPreviews:{},tabIndex:0,settingsAvatar:undefined});
    hideDialog();mountOnboarding();showToast("Dados apagados.");
  }});
}

function previewAvatar(ip,isGrp){
  const p=isGrp?(S.groups[ip]||{}):(S.directory[ip]||{});
  const src=p.avatar||null;const name=p.name||p.username||ip;
  const w=document.getElementById("lightbox-wrap");if(!w)return;
  w.innerHTML=`<div class="lightbox">
    <button class="lightbox-close" data-action="close-lightbox">${icon("x",20)}</button>
    ${src?`<img src="${src}" alt="${esc(name)}" style="max-width:80vw;max-height:80vh;border-radius:50%;object-fit:cover"/>`:
    `<div style="width:160px;height:160px;border-radius:50%;background:linear-gradient(135deg,#1e1a10,#2a2010);display:flex;align-items:center;justify-content:center;font-size:64px;color:var(--gold);font-weight:700">${esc(name.charAt(0).toUpperCase())}</div>`}
    <p style="color:var(--text);margin-top:14px;font-weight:600">${esc(name)}</p>
    <p class="mono" style="color:var(--gold);font-size:13px;margin-top:4px">IP ${ip}</p>
  </div>`;
}

/* ============================================================
   ONESIGNAL TAG
============================================================ */
function tagOneSignal(ip){
  window.OneSignalDeferred=window.OneSignalDeferred||[];
  window.OneSignalDeferred.push(async function(OneSignal){try{await OneSignal.User.addTag("ip",ip);}catch{}});
}

/* ============================================================
   LIVE LOOPS
============================================================ */
function startLiveLoops(){heartbeat();heartTimer=setInterval(heartbeat,12000);dirTimer=setInterval(pollDir,6000);chatTimer=setInterval(pollChats,5000);}
function stopLiveLoops(){clearInterval(heartTimer);clearInterval(dirTimer);clearInterval(chatTimer);}

async function heartbeat(){
  if(!S.identity)return;
  const dir=(await dbGet("directory",true))||{};
  dir[S.identity.ip]={...(dir[S.identity.ip]||{}),username:S.identity.username,avatar:S.identity.avatar,lastSeen:Date.now()};
  await dbSet("directory",dir,true);S.directory=dir;renderHeader();
}
async function pollDir(){
  if(!S.identity)return;
  const dir=await dbGet("directory",true);if(dir){S.directory=dir;renderHeader();}
}
async function pollChats(){
  if(!S.identity)return;
  const all=[...S.contacts,...Object.keys(S.groups)];
  for(const id of all){
    const isGrp=!!S.groups[id];
    const key="conv:"+(isGrp?id:convKey(S.identity.ip,id));
    const arr=(await dbGet(key,true))||[];
    const prev=S.lastCounts[key]??arr.length;
    if(arr.length>prev){
      const last=arr[arr.length-1];
      if(last.sender!==S.identity.ip&&S.activeChat!==id){
        const p=isGrp?(S.groups[id]||{}):(S.directory[last.sender]||{});
        const name=p.name||p.username||last.sender;
        showToast(`Nova mensagem de ${name}`);
      }
      if(S.activeChat===id){S.messages=arr;renderContent();scrollBottom();}
      if(TABS[S.tabIndex].id==="conversations")S.convPreviews[id]=arr[arr.length-1];
    }
    S.lastCounts[key]=arr.length;
  }
}

/* ============================================================
   EVENT DELEGATION
============================================================ */
document.body.addEventListener("click",async e=>{
  const el=e.target.closest("[data-action]");if(!el)return;
  const a=el.dataset.action;
  if(a==="close-modal"&&e.target===e.currentTarget){closeModal();return;}
  switch(a){
    case"nav-next":navNext();break;
    case"nav-prev":navPrev();break;
    case"goto-tab":setTab(parseInt(el.dataset.index,10));break;
    case"copy-ip":
      try{await navigator.clipboard.writeText(S.identity.ip);showToast("Código copiado!");}catch{showToast("Não foi possível copiar.");}break;
    case"add-contact":await addContact();break;
    case"remove-contact":removeContact(el.dataset.ip);break;
    case"block-contact":await blockContact(el.dataset.ip);break;
    case"unblock-contact":await unblockContact(el.dataset.ip);break;
    case"open-chat":await openChat(el.dataset.ip);break;
    case"open-group-chat":await openGroupChat(el.dataset.ip);break;
    case"close-chat":closeChat();break;
    case"delete-conversation":deleteConversation(el.dataset.ip);break;
    case"delete-message":deleteMessage(el.dataset.id);break;
    case"send-text":sendTextFromInput();break;
    case"send-sticker":
      await sendMessage("sticker",el.dataset.emoji);
      document.getElementById("sticker-panel")?.classList.add("hidden");break;
    case"toggle-stickers":document.getElementById("sticker-panel")?.classList.toggle("hidden");break;
    case"pick-chat-file":document.getElementById("chat-file-input")?.click();break;
    case"toggle-record":await toggleRecording();break;
    case"open-status-composer":openStatusComposer(el.dataset.type);break;
    case"pick-status-photo":document.getElementById("status-photo-input")?.click();break;
    case"pick-status-music":document.getElementById("status-music-input")?.click();break;
    case"pick-status-text-music":document.getElementById("status-text-music-input")?.click();break;
    case"cancel-status-composer":closeStatusComposer();break;
    case"publish-status-text":await publishStatusText();break;
    case"delete-status":deleteStatus(el.dataset.id);break;
    case"hide-status-owner":await toggleHidden(el.dataset.ip);await loadStatusFeed();renderContent();break;
    case"pick-avatar":document.getElementById("avatar-input")?.click();break;
    case"pick-onboarding-avatar":document.getElementById("onb-avatar-input")?.click();break;
    case"regenerate-ip":{const i=document.getElementById("onb-ip-input");if(i)i.value=genIp();break;}
    case"submit-onboarding":await submitOnboarding();break;
    case"save-profile":await saveProfile();break;
    case"toggle-hidden-contact":await toggleHidden(el.dataset.ip);renderContent();break;
    case"request-notif":await requestNotifications();break;
    case"download-backup":await downloadBackup();break;
    case"pick-backup-file":document.getElementById("backup-input")?.click();break;
    case"clear-data":clearMyDataConfirm();break;
    case"dialog-confirm":if(currentDialogOK)await currentDialogOK();break;
    case"dialog-cancel":hideDialog();break;
    case"close-lightbox":closeLightbox();break;
    case"close-modal":closeModal();break;
    case"preview-media":openLightbox(el.dataset.src,el.dataset.type);break;
    case"preview-avatar":previewAvatar(el.dataset.ip,el.dataset.isgrp==="true");break;
    case"show-msg-menu":openModal(msgMenuHTML(el.dataset.id));break;
    case"show-chat-menu":openModal(chatMenuHTML());break;
    case"react-msg":await reactToMsg(el.dataset.id,el.dataset.emoji);break;
    case"reply-to-msg":setReplyTo(el.dataset.id);break;
    case"cancel-reply":S.replyTo=null;const rb=document.getElementById("reply-bar-wrap");if(rb)rb.innerHTML="";break;
    case"forward-msg":openModal(forwardModalHTML(el.dataset.id));break;
    case"do-forward":await doForward(el.dataset.msgid,el.dataset.target);break;
    case"edit-msg":await editMsg(el.dataset.id);break;
    case"vote-poll":await votePoll(el.dataset.msgid,parseInt(el.dataset.opt,10));break;
    case"toggle-disappearing":await toggleDisappearing();break;
    case"open-poll-creator":closeModal();setTimeout(()=>openModal(pollCreatorHTML()),100);break;
    case"add-poll-option":{
      const list=document.getElementById("poll-options-list");if(!list)break;
      const n=list.querySelectorAll(".poll-opt-input").length+1;
      const inp=document.createElement("input");inp.className="input poll-opt-input";inp.placeholder=`Opção ${n}`;inp.style.marginBottom="6px";
      list.appendChild(inp);break;}
    case"send-poll":{
      const q=(document.getElementById("poll-question")?.value||"").trim();if(!q)return showToast("Escreva a pergunta.");
      const opts=Array.from(document.querySelectorAll(".poll-opt-input")).map(i=>i.value.trim()).filter(Boolean);
      if(opts.length<2)return showToast("Adicione pelo menos 2 opções.");
      await sendMessage("poll","",{poll:{question:q,options:opts,votes:{}}});
      closeModal();break;}
    case"open-new-group":openModal(newGroupModalHTML());break;
    case"create-group":await createGroup();break;
    case"scroll-to-msg":{
      const el2=document.querySelector(`[data-msgid="${el.dataset.id}"]`);
      if(el2){el2.scrollIntoView({behavior:"smooth",block:"center"});el2.style.background="rgba(212,168,67,0.15)";setTimeout(()=>el2.style.background="",1500);}break;}
  }
});

document.body.addEventListener("change",async e=>{
  const t=e.target;
  if(t.id==="chat-file-input"){const f=t.files[0];t.value="";if(f)await handleAttach(f);}
  else if(t.id==="status-photo-input"){const f=t.files[0];t.value="";if(f)await onStatusPhotoSelected(f);}
  else if(t.id==="status-music-input"){const f=t.files[0];t.value="";if(f)await onStatusMusicSelected(f);}
  else if(t.id==="status-text-music-input"){const f=t.files[0];t.value="";if(f)await onStatusTextMusicSelected(f);}
  else if(t.id==="avatar-input"){const f=t.files[0];t.value="";if(f)await onSettingsAvatarSelected(f);}
  else if(t.id==="onb-avatar-input"){const f=t.files[0];t.value="";if(f)await onOnboardingAvatarSelected(f);}
  else if(t.id==="backup-input"){const f=t.files[0];t.value="";if(f)await restoreBackup(f);}
});

document.body.addEventListener("keydown",e=>{
  if(e.key==="Enter"&&!e.shiftKey){
    const id=e.target.id;
    if(id==="chat-text-input"){e.preventDefault();sendTextFromInput();}
    else if(id==="onb-username-input"||id==="onb-ip-input"){e.preventDefault();submitOnboarding();}
    else if(id==="add-ip-input"){e.preventDefault();addContact();}
  }
});

document.body.addEventListener("input",e=>{
  if(e.target.dataset?.role==="digits")e.target.value=e.target.value.replace(/\D/g,"").slice(0,6);
  if(e.target.id==="chat-text-input"){const t=e.target;t.style.height="auto";t.style.height=Math.min(t.scrollHeight,120)+"px";}
});

async function handleAttach(file){
  let type="file";
  if(file.type.startsWith("image/"))type="image";
  else if(file.type.startsWith("video/"))type="video";
  else if(file.type.startsWith("audio/"))type="audio";
  try{
    const data=type==="image"?await resizeImg(file,900,0.75):await fileToDataURL(file);
    await sendMessage(type,data,{fileName:file.name});
  }catch{showToast("Não foi possível ler esse arquivo.");}
}

async function toggleRecording(){
  const micBtn=document.getElementById("mic-btn");
  if(S.recording){S.mediaRecorder?.stop();return;}
  try{
    const stream=await navigator.mediaDevices.getUserMedia({audio:true});
    const rec=new MediaRecorder(stream);S.chunks=[];
    rec.ondataavailable=e=>S.chunks.push(e.data);
    rec.onstop=async()=>{
      const blob=new Blob(S.chunks,{type:"audio/webm"});
      const reader=new FileReader();
      reader.onload=async e=>{await sendMessage("audio",e.target.result,{fileName:"audio.webm"});};
      reader.readAsDataURL(blob);
      stream.getTracks().forEach(t=>t.stop());
      S.recording=false;
      if(micBtn){micBtn.classList.remove("recording");micBtn.innerHTML=icon("mic",20);}
    };
    S.mediaRecorder=rec;rec.start();S.recording=true;
    if(micBtn){micBtn.classList.add("recording");micBtn.innerHTML=icon("square",20);}
  }catch{showToast("Microfone indisponível. Anexe um arquivo de áudio.");}
}

window.__onOneSignalReady=function(){
  if(window.__oneSignalNotifPerm){S.notifPerm=window.__oneSignalNotifPerm;renderContent();}
};

async function init(){
  const[id,c,h,bl,dir,grps]=await Promise.all([
    dbGet("myIdentity",false),dbGet("myContacts",false),dbGet("myHidden",false),
    dbGet("myBlocked",false),dbGet("directory",true),dbGet("myGroups",false),
  ]);
  S.identity=id;S.contacts=c||[];S.hidden=h||[];S.blocked=bl||[];
  S.directory=dir||{};S.groups=grps||{};
  if(S.identity){tagOneSignal(S.identity.ip);mountShell();startLiveLoops();}
  else mountOnboarding();
}
init();
if("serviceWorker"in navigator)window.addEventListener("load",()=>navigator.serviceWorker.register("OneSignalSDKWorker.js").catch(()=>{}));
