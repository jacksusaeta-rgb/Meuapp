<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>Conexão</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f172a">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Conexão">

<style>
:root{
  --bg:#0f172a;
  --panel:#1e293b;
  --panel-2:#16213a;
  --border:#334155;
  --text:#f1f5f9;
  --muted:#94a3b8;
  --muted-2:#64748b;
  --accent:#fbbf24;
  --accent-ink:#1e293b;
  --danger:#fb7185;
  --danger-bg:rgba(244,63,94,0.1);
  --online:#34d399;
}
*{box-sizing:border-box;}
html,body{height:100%;margin:0;}
body{
  background:#020617;
  font-family:'Inter', system-ui, sans-serif;
  color:var(--text);
  -webkit-tap-highlight-color: transparent;
}
button{font-family:inherit;}
.mono{font-family:'JetBrains Mono', monospace;}
.hidden, .hidden-input{display:none !important;}
#root{height:100vh;width:100%;display:flex;justify-content:center;}

.shell{
  position:relative; width:100%; max-width:480px; height:100vh; background:var(--bg);
  display:flex; flex-direction:column; overflow:hidden;
  border-left:1px solid var(--border); border-right:1px solid var(--border);
}
.header{
  display:flex; align-items:center; gap:12px; padding:16px 16px 12px 16px; padding-right:64px;
  border-bottom:1px solid var(--border); flex-shrink:0;
}
.content{flex:1; overflow-y:auto; padding:16px; padding-bottom:104px; -webkit-overflow-scrolling:touch;}

.nav-btn{
  position:absolute; z-index:30; width:46px; height:46px; border-radius:50%; border:none; cursor:pointer;
  display:flex; align-items:center; justify-content:center; box-shadow:0 6px 16px rgba(0,0,0,0.45);
}
.nav-btn.next{ top:12px; right:12px; background:var(--accent); color:var(--accent-ink); }
.nav-btn.prev{ bottom:12px; left:12px; background:var(--panel); color:var(--text); border:1px solid var(--border); }
.nav-btn:active{ transform:scale(0.94); }

.avatar-wrap{position:relative; flex-shrink:0;}
.avatar-img{width:100%;height:100%;border-radius:50%;object-fit:cover;border:1px solid var(--border);display:block;}
.avatar-fallback{width:100%;height:100%;border-radius:50%;background:var(--panel);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;color:var(--accent);font-weight:700;}
.avatar-dot{position:absolute;bottom:-1px;right:-1px;width:11px;height:11px;border-radius:50%;border:2px solid var(--bg);}
.avatar-dot.on{background:var(--online);}
.avatar-dot.off{background:var(--muted-2);}
.avatar-pick{background:none;border:none;padding:0;cursor:pointer;}

.ip-readout{display:inline-flex; gap:6px; padding:10px 14px; background:#020617; border:1px solid var(--border); border-radius:10px; box-shadow:inset 0 1px 6px rgba(0,0,0,0.6);}
.ip-readout.compact{gap:2px; padding:4px 8px;}
.ip-digit{font-family:'JetBrains Mono',monospace; color:var(--accent); font-weight:700; font-size:22px; text-shadow:0 0 8px rgba(251,191,36,0.6);}
.ip-readout.compact .ip-digit{font-size:12px; text-shadow:none;}

.label{font-size:13px; font-weight:600; color:var(--text); margin:0 0 8px 0;}
.label.center{text-align:center;}
.label.danger{color:var(--danger);}
.muted-xs{font-size:12px; color:var(--muted); margin:0 0 8px 0;}
.empty{font-size:14px; color:var(--muted-2);}
.empty.center{text-align:center; margin-top:40px;}
.flex-1{flex:1;}
.min-w0{min-width:0;}
.truncate{white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
.name{font-weight:600; font-size:15px; margin:0;}
.sub{font-size:12px; color:var(--muted); margin:2px 0 0 0;}
.time-xs{font-size:11px; color:var(--muted-2); flex-shrink:0; margin-left:8px;}
.row-between{display:flex; align-items:center; justify-content:space-between; gap:8px;}
.row-gap{display:flex; gap:8px;}
.row-gap-4{display:flex; gap:16px;}
.align-center{align-items:center;}
.row-end{display:flex; justify-content:flex-end; gap:8px; margin-top:10px;}
.stack-2 > * + *{margin-top:8px;}
.stack-4 > * + *{margin-top:16px;}
.stack-5 > * + *{margin-top:20px;}
.stack-6 > * + *{margin-top:24px;}
.stack-7 > * + *{margin-top:28px;}
.dot-sep{color:var(--muted-2);}
.accent{color:var(--accent);}

.card{background:rgba(30,41,59,0.6); border:1px solid var(--border); border-radius:16px; padding:16px;}

.input{width:100%; background:var(--panel); border:1px solid var(--border); border-radius:12px; padding:11px 14px; color:var(--text); font-size:15px; outline:none;}
.input:focus{border-color:var(--accent);}
.input.center{text-align:center; letter-spacing:4px;}
.textarea{width:100%; background:var(--panel-2); border:1px solid var(--border); border-radius:10px; padding:10px; color:var(--text); resize:none; outline:none; font-family:inherit; font-size:14px;}
.textarea:focus{border-color:var(--accent);}

.btn{border:none; border-radius:12px; padding:11px 16px; font-weight:600; font-size:14px; cursor:pointer;}
.btn-primary{background:var(--accent); color:var(--accent-ink);}
.btn-ghost{background:transparent; color:var(--muted); padding:8px 12px;}
.btn-danger{background:var(--danger); color:white;}
.btn-sm{padding:7px 12px; font-size:13px;}

.icon-btn{background:none; border:none; color:var(--muted); cursor:pointer; padding:8px; border-radius:50%; display:flex; align-items:center; justify-content:center;}
.icon-btn.accent{color:var(--accent);}
.icon-btn.danger{color:var(--muted);}
.icon-btn.danger:active{color:var(--danger);}

.full-btn{display:flex; align-items:center; justify-content:center; gap:8px; width:100%; background:var(--panel); border:1px solid var(--border); color:var(--text); border-radius:12px; padding:12px; font-size:14px; cursor:pointer;}
.full-btn.danger-btn{background:var(--danger-bg); border-color:rgba(244,63,94,0.3); color:#fda4af;}
.note{font-size:12px; color:var(--muted-2); margin-top:8px; line-height:1.5;}

.list-row{display:flex; align-items:center; gap:12px; background:rgba(30,41,59,0.5); border:1px solid rgba(51,65,85,0.7); border-radius:14px; padding:12px;}

.status-buttons{display:flex; gap:8px;}
.status-type-btn{flex:1; padding:11px; border-radius:12px; border:1px solid var(--border); background:var(--panel); color:var(--muted); font-size:13px; font-weight:600; cursor:pointer;}
.status-type-btn.active{background:var(--accent); color:var(--accent-ink); border-color:var(--accent);}
.composer-card{background:rgba(30,41,59,0.6); border:1px solid var(--border); border-radius:14px; padding:12px;}
.status-card{background:rgba(30,41,59,0.5); border:1px solid rgba(51,65,85,0.7); border-radius:18px; padding:16px;}
.status-card-head{display:flex; align-items:center; gap:10px; margin-bottom:10px;}
.status-img{width:100%; max-height:280px; object-fit:cover; border-radius:12px; display:block;}
.status-caption{font-size:13px; color:var(--muted); margin-top:8px;}
.status-music-label{display:flex; align-items:center; gap:6px; color:var(--accent); font-size:13px; font-weight:600; margin-bottom:6px;}
.status-text{white-space:pre-wrap; word-break:break-word; margin:0;}

.toggle-btn{display:flex; align-items:center; gap:6px; font-size:12px; padding:7px 12px; border-radius:10px; border:none; cursor:pointer;}
.toggle-btn.on{background:rgba(251,191,36,0.15); color:#fcd34d;}
.toggle-btn.off{background:var(--panel-2); color:var(--muted);}

.messages-list{display:flex; flex-direction:column; gap:10px;}
.day-sep{display:flex; justify-content:center; margin:8px 0;}
.day-sep span{font-size:12px; color:var(--muted); background:var(--panel); padding:4px 12px; border-radius:99px;}
.msg-row{display:flex; align-items:flex-end; gap:6px;}
.msg-row.mine{justify-content:flex-end; flex-direction:row-reverse;}
.msg-row.theirs{justify-content:flex-start;}
.msg-del{background:none; border:none; color:var(--muted-2); cursor:pointer; opacity:0.55; flex-shrink:0;}
.msg-del:active{opacity:1;}
.bubble{max-width:75%; padding:9px 12px; border-radius:18px;}
.bubble-mine{background:var(--accent); color:var(--accent-ink); border-bottom-right-radius:6px;}
.bubble-theirs{background:var(--panel); color:var(--text); border-bottom-left-radius:6px;}
.msg-text{white-space:pre-wrap; word-break:break-word;}
.msg-media{max-width:200px; max-height:260px; border-radius:10px; display:block; object-fit:cover;}
.msg-file{display:flex; align-items:center; gap:6px; font-size:14px; text-decoration:underline dotted; color:inherit;}
.msg-time{font-size:10px; margin:4px 0 0 0; text-align:right; opacity:0.7;}
.sticker{font-size:46px; line-height:1;}

#composer-wrap{flex-shrink:0;}
.composer{background:var(--bg); border-top:1px solid var(--border); padding:10px 12px 10px 64px;}
.sticker-panel{display:grid; grid-template-columns:repeat(6,1fr); gap:6px; background:var(--panel); border:1px solid var(--border); border-radius:14px; padding:10px; margin-bottom:8px;}
.sticker-pick{background:none; border:none; font-size:22px; cursor:pointer; padding:4px;}
.composer-row{display:flex; align-items:center; gap:4px;}
.send-btn{background:var(--accent); color:var(--accent-ink); border:none; border-radius:50%; width:40px; height:40px; display:flex; align-items:center; justify-content:center; cursor:pointer; flex-shrink:0;}
#mic-btn.recording{color:var(--danger); background:rgba(244,63,94,0.12); border-radius:50%;}

.tab-dots{display:flex; gap:4px; flex-shrink:0;}
.tab-dot{width:28px; height:28px; border-radius:50%; border:none; background:none; color:var(--muted-2); display:flex; align-items:center; justify-content:center; cursor:pointer;}
.tab-dot.active{background:var(--accent); color:var(--accent-ink);}
.tab-label{font-size:11px; color:var(--muted); margin:0;}
.chat-sub{display:flex; align-items:center; gap:6px; font-size:12px; color:var(--muted);}

#toast-wrap{position:absolute; top:0; left:0; right:0; display:flex; justify-content:center; pointer-events:none; z-index:40;}
.toast{margin-top:12px; background:var(--panel); border:1px solid var(--border); padding:9px 18px; border-radius:99px; font-size:13px; box-shadow:0 8px 20px rgba(0,0,0,0.4); max-width:80%; text-align:center; pointer-events:auto;}
.dialog-overlay{position:absolute; inset:0; background:rgba(2,6,23,0.82); display:flex; align-items:center; justify-content:center; padding:24px; z-index:50;}
.dialog-box{background:var(--bg); border:1px solid var(--border); border-radius:18px; padding:20px; width:100%; max-width:320px;}
.dialog-title{font-weight:700; margin:0 0 4px 0;}
.dialog-msg{font-size:13px; color:var(--muted); margin:0 0 16px 0;}
.dialog-actions{display:flex; justify-content:flex-end; gap:8px;}

.onboarding{height:100vh; width:100%; max-width:420px; margin:0 auto; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:24px; text-align:center;}
.eyebrow{color:var(--accent); font-size:11px; letter-spacing:2px; text-transform:uppercase; margin:0 0 8px 0;}
.onb-title{font-size:24px; font-weight:700; margin:0 0 24px 0;}
.onb-input{max-width:280px; margin-bottom:16px; text-align:center;}
.onb-ip-row{display:flex; gap:8px; max-width:280px; width:100%; margin-bottom:8px;}
.onb-ip-input{font-size:20px; letter-spacing:6px;}
.onb-submit{width:100%; max-width:280px; margin-top:16px; padding:14px;}
.onb-note{font-size:12px; color:var(--muted-2); max-width:280px; margin-top:16px; line-height:1.5;}
.onb-avatar-btn{margin-bottom:18px;}

.loading-screen{height:100vh; display:flex; align-items:center; justify-content:center; color:var(--accent);}
.spin{animation:spin 1s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>

<script>
/* ============================== constants & state ============================== */

const TABS = [

  { id: "status", label: "Status", icon: "image" },
  { id: "conversations", label: "Conversas", icon: "messageCircle" },

const STICKERS = ["😀","😂","😍","🥳","😎","🥺","👍","🙏","🔥","❤️","🎉","😴"];

const state = {
  identity: null,

  directory: {},

  hidden: [],

  convPreviews: {},

};

const root = document.getElementById("root");
let heartbeatTimer = null, dirPollTimer = null, chatPollTimer = null, toastTimer = null;
let currentDialogConfirm = null;

/* ============================== small helpers ============================== */

function escapeHtml(s) {
  return String(s ?? "").replace(/[&<>"']/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
}
function genId() { return Date.now() + "-" + Math.random().toString(36).slice(2); }
function genIp() { return String(Math.floor(100000 + Math.random() * 900000)); }
function isValidIp(v) { return /^[0-9]{6}$/.test(v); }
function convKey(a, b) { return [a, b].sort().join("_"); }

function fmtClock(ts) {
  return new Date(ts).toLocaleTimeString("pt-BR", { hour: "2-digit", minute: "2-digit" });
}
function fmtDay(ts) {
  const d = new Date(ts), today = new Date(), yest = new Date();
  yest.setDate(today.getDate() - 1);
  const sameDay = (a, b) => a.toDateString() === b.toDateString();
  if (sameDay(d, today)) return "Hoje";
  if (sameDay(d, yest)) return "Ontem";
  return d.toLocaleDateString("pt-BR", { day: "2-digit", month: "2-digit", year: "numeric" });
}
function lastSeenLabel(lastSeen) {
  if (!lastSeen) return "Offline";
  const diff = Date.now() - lastSeen;
  if (diff < 30000) return "Online";
  const mins = Math.floor(diff / 60000);
  if (mins < 1) return "Visto agora";
  if (mins < 60) return `Visto há ${mins} min`;
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return `Visto há ${hrs} h`;
  return `Visto há ${Math.floor(hrs / 24)} d`;
}
function isOnline(lastSeen) { return !!lastSeen && Date.now() - lastSeen < 30000; }

function resizeImage(file, maxW, quality) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        let w = img.width, h = img.height;
        if (w > maxW) { h = Math.round((h * maxW) / w); w = maxW; }
        const canvas = document.createElement("canvas");
        canvas.width = w; canvas.height = h;
        canvas.getContext("2d").drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL("image/jpeg", quality));
      };
      img.onerror = reject;
      img.src = e.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}
function fileToDataURL(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => resolve(e.target.result);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

const SUPABASE_URL = "https://iziobxzrhhlnqvfehuho.supabase.co";
const SUPABASE_KEY = "sb_publishable_X5xisyNyAcftcSZ7x0S7Mg_w_V0mdvW";

async function storageGet(key, shared) {
  if (!shared) {
    try {
      const raw = localStorage.getItem("local:" + key);
      return raw ? JSON.parse(raw) : null;
    } catch { return null; }
  }
  try {
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/app_data?key=eq.${encodeURIComponent(key)}&select=value`,
      { headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}` } }
    );
    if (!res.ok) return null;
    const rows = await res.json();
    if (!rows.length) return null;
    return JSON.parse(rows[0].value);
  } catch { return null; }
}
async function storageSet(key, value, shared) {
  if (!shared) {
    try { localStorage.setItem("local:" + key, JSON.stringify(value)); return true; }
    catch { return false; }
  }
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/app_data`, {
      method: "POST",
      headers: {
        apikey: SUPABASE_KEY,
        Authorization: `Bearer ${SUPABASE_KEY}`,
        "Content-Type": "application/json",
        Prefer: "resolution=merge-duplicates",
      },
      body: JSON.stringify({ key, value: JSON.stringify(value) }),
    });
    return res.ok;
  } catch { return false; }
}
async function storageDelete(key, shared) {
  if (!shared) {
    try { localStorage.removeItem("local:" + key); } catch {}
    return;
  }
  try {
    await fetch(`${SUPABASE_URL}/rest/v1/app_data?key=eq.${encodeURIComponent(key)}`, {
      method: "DELETE",
      headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}` },
    });
  } catch {}
}

    messageCircle: '<path d="M21 11.5a8.38 8.38 0 01-.9 3.8 8.5 8.5 0 01-7.6 4.7 8.38 8.38 0 01-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 01-.9-3.8 8.5 8.5 0 014.7-7.6 8.38 8.38 0 013.8-.9h.5a8.48 8.48 0 018 8v.5z"/>',
    settings: '<circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 11-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 11-2.83-2.83l.06-.06A1.65 1.65 0 004.6 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 112.83-2.83l.06.06A1.65 1.65 0 009 4.6a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 112.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/>',

}

/* ============================== UI fragment builders ============================== */

function avatar(name, src, px, online) {
  px = px || 40;
  const initial = escapeHtml((name || "?").trim().charAt(0).toUpperCase());
  const dot = online === undefined ? "" : `<span class="avatar-dot ${online ? "on" : "off"}"></span>`;
  const inner = src
    ? `<img src="${src}" alt="" class="avatar-img"/>`
    : `<div class="avatar-fallback" style="font-size:${Math.round(px * 0.42)}px">${initial}</div>`;
  return `<div class="avatar-wrap" style="width:${px}px;height:${px}px">${inner}${dot}</div>`;
}

function ipReadout(ip, compact) {
  const digits = (ip || "------").split("");
  return `<div class="ip-readout ${compact ? "compact" : ""}">${digits.map((d) => `<span class="ip-digit">${escapeHtml(d)}</span>`).join("")}</div>`;
}

function messageContentHTML(m) {
  switch (m.type) {
    case "image": return `<img class="msg-media" src="${m.content}" alt="foto"/>`;
    case "video": return `<video class="msg-media" src="${m.content}" controls></video>`;
    case "audio": return `<audio src="${m.content}" controls style="max-width:220px"></audio>`;
    case "file": return `<a class="msg-file" href="${m.content}" download="${escapeHtml(m.fileName || "arquivo")}">${icon("file", 16)} ${escapeHtml(m.fileName || "arquivo")}</a>`;
    case "sticker": return `<span class="sticker">${m.content}</span>`;
    default: return `<span class="msg-text">${escapeHtml(m.content)}</span>`;
  }
}

function statusContentHTML(s) {
  if (s.type === "image") {
    return `<div>${s.content ? `<img class="status-img" src="${s.content}"/>` : ""}${s.caption ? `<p class="status-caption">${escapeHtml(s.caption)}</p>` : ""}</div>`;
  }
  if (s.type === "music") {
    return `<div><div class="status-music-label">${icon("music", 16)} ${escapeHtml(s.caption || "Tocando agora")}</div>${s.content ? `<audio src="${s.content}" controls style="width:100%"></audio>` : ""}</div>`;
  }
  return `<p class="status-text">${escapeHtml(s.content)}</p>`;
}

/* ============================== render: shell / header / content ============================== */

function mountShell() {
  root.innerHTML = `
    <div class="shell">
      <div id="header" class="header"></div>
      <div id="content" class="content"></div>
      <div id="composer-wrap"></div>
      <button class="nav-btn next" data-action="nav-next" aria-label="Próximo">${icon("chevronRight", 22)}</button>
      <button class="nav-btn prev" data-action="nav-prev" aria-label="Anterior">${icon("chevronLeft", 22)}</button>
      <div id="toast-wrap"></div>
      <div id="dialog-wrap"></div>
    </div>`;
  renderHeader();
  renderContent();
}

function renderHeader() {
  const header = document.getElementById("header");
  if (!header) return;
  if (state.activeChat) {
    const p = state.directory[state.activeChat] || {};
    header.innerHTML = `
      <button class="icon-btn" data-action="close-chat" aria-label="Fechar conversa">${icon("x", 20)}</button>
      ${avatar(p.username || state.activeChat, p.avatar, 36, isOnline(p.lastSeen))}
      <div class="min-w0">
        <p class="name truncate">${escapeHtml(p.username || state.activeChat)}</p>
        <div class="chat-sub">
          <span>${lastSeenLabel(p.lastSeen)}</span>
          <span class="dot-sep">•</span>
          <span class="mono accent">IP ${state.activeChat}</span>
        </div>
      </div>`;
  } else {
    const id = state.identity;
    header.innerHTML = `
      ${avatar(id.username, id.avatar, 36, true)}
      <div class="flex-1 min-w0">
        <p class="tab-label">${escapeHtml(TABS[state.tabIndex].label)}</p>
        <p class="name truncate">${escapeHtml(id.username)}</p>
      </div>
      <div class="tab-dots">
        ${TABS.map((t, i) => `<button class="tab-dot ${i === state.tabIndex ? "active" : ""}" data-action="goto-tab" data-index="${i}" aria-label="${escapeHtml(t.label)}">${icon(t.icon, 14)}</button>`).join("")}
      </div>`;
  }
}

function renderContent() {
  const content = document.getElementById("content");
  if (!content) return;
  if (state.activeChat) {
    content.innerHTML = `<div id="messages-list" class="messages-list">${buildMessagesHTML()}</div>`;
  } else {
    const id = TABS[state.tabIndex].id;
    if (id === "add") content.innerHTML = screenAdd();
    else if (id === "status") content.innerHTML = screenStatus();
    else if (id === "conversations") content.innerHTML = screenConversations();
    else content.innerHTML = screenSettings();
  }
}

function scrollMessagesToBottom() {
  requestAnimationFrame(() => {
    const content = document.getElementById("content");
    if (content) content.scrollTop = content.scrollHeight;
  });
}

function statusCard(s) {

function screenConversations() {
  const sorted = [...state.contacts].sort((a, b) => {
    const la = (state.convPreviews[a] && state.convPreviews[a].timestamp) || 0;
    const lb = (state.convPreviews[b] && state.convPreviews[b].timestamp) || 0;
    return lb - la;
  });
  if (sorted.length === 0) return `<p class="empty">Nenhuma conversa ainda. Adicione alguém na aba Adicionar.</p>`;
  return `<div class="stack-2">${sorted.map(convRow).join("")}</div>`;
}

function convRow(ip) {
  const p = state.directory[ip] || {};
  const last = state.convPreviews[ip];
  return `
  <div class="list-row">
    ${avatar(p.username || ip, p.avatar, 44, isOnline(p.lastSeen))}
    <div class="flex-1 min-w0" data-action="open-chat" data-ip="${ip}" style="cursor:pointer">
      <div class="row-between">
        <p class="name truncate">${escapeHtml(p.username || ip)}</p>
        ${last ? `<p class="time-xs">${fmtClock(last.timestamp)}</p>` : ""}
      </div>
      <p class="sub truncate">${last ? (last.type === "text" ? escapeHtml(last.content) : `enviou um(a) ${last.type}`) : "Diga olá 👋"}</p>
    </div>
    <button class="icon-btn danger" data-action="delete-conversation" data-ip="${ip}" aria-label="Excluir conversa">${icon("trash", 18)}</button>
  </div>`;
}

function buildMessagesHTML() {
  if (state.messages.length === 0) return `<p class="empty center">Nenhuma mensagem ainda. Envie a primeira!</p>`;
  let html = "", lastDay = null;
  state.messages.forEach((m) => {
    const day = fmtDay(m.timestamp);
    if (day !== lastDay) { html += `<div class="day-sep"><span>${day}</span></div>`; lastDay = day; }
    const mine = m.sender === state.identity.ip;
    html += `
    <div class="msg-row ${mine ? "mine" : "theirs"}">
      ${mine ? `<button class="msg-del" data-action="delete-message" data-id="${m.id}" aria-label="Apagar mensagem">${icon("trash", 14)}</button>` : ""}
      <div class="bubble ${mine ? "bubble-mine" : "bubble-theirs"}">
        ${messageContentHTML(m)}
        <p class="msg-time">${fmtClock(m.timestamp)}</p>
      </div>
    </div>`;
  });
  return html;
}

/* ============================== toast / dialog ============================== */

function showToast(msg) {
  const wrap = document.getElementById("toast-wrap");
  if (!wrap) return;
  wrap.innerHTML = `<div class="toast">${escapeHtml(msg)}</div>`;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { wrap.innerHTML = ""; }, 2600);
}
function showDialog(opts) {
  currentDialogConfirm = opts.onConfirm;
  const wrap = document.getElementById("dialog-wrap");
  if (!wrap) return;
  wrap.innerHTML = `
  <div class="dialog-overlay">
    <div class="dialog-box">
      <p class="dialog-title">${escapeHtml(opts.title)}</p>
      <p class="dialog-msg">${escapeHtml(opts.message)}</p>
      <div class="dialog-actions">
        <button class="btn btn-ghost" data-action="dialog-cancel">Cancelar</button>
        <button class="btn btn-danger" data-action="dialog-confirm">${escapeHtml(opts.confirmLabel || "Excluir")}</button>
      </div>
    </div>
  </div>`;
}
function hideDialog() {
  const wrap = document.getElementById("dialog-wrap");
  if (wrap) wrap.innerHTML = "";
  currentDialogConfirm = null;
}

/* ============================== navigation ============================== */

function navNext() { if (state.activeChat) { closeChat(); return; } setTab((state.tabIndex + 1) % TABS.length); }
function navPrev() { if (state.activeChat) { closeChat(); return; } setTab((state.tabIndex - 1 + TABS.length) % TABS.length); }

function setTab(i) {
  state.tabIndex = i;
  renderHeader();
  renderContent();
  onEnterTab(TABS[i].id);
}

async function onEnterTab(id) {
  if (id === "add") {
    const dir = await storageGet("directory", true);
    if (dir) { state.directory = dir; renderContent(); }
  } else if (id === "status") {
    await loadStatusFeed();
    renderContent();
  } else if (id === "conversations") {
    await loadConversationPreviews();
    renderContent();
  }
}

async function openChat(ip) {
  state.activeChat = ip;
  const key = "conv:" + convKey(state.identity.ip, ip);
  const arr = (await storageGet(key, true)) || [];
  state.messages = arr;
  state.lastCounts[key] = arr.length;
  renderHeader();
  renderContent();
  document.getElementById("composer-wrap").innerHTML = buildComposerHTML();
  scrollMessagesToBottom();
}
function closeChat() {
  state.activeChat = null;
  state.messages = [];
  renderHeader();
  renderContent();
  document.getElementById("composer-wrap").innerHTML = "";
}

/* ============================== identity / onboarding actions ============================== */

async function submitOnboarding() {
  const username = (document.getElementById("onb-username-input").value || "").trim().slice(0, 20);
  const ip = document.getElementById("onb-ip-input").value;
  if (!username) return showToast("Escolha um nome de usuário.");
  if (!isValidIp(ip)) return showToast("O código precisa ter 6 dígitos.");
  const btn = document.getElementById("onb-submit-btn");
  btn.disabled = true; btn.textContent = "Criando...";
  const dir = (await storageGet("directory", true)) || {};
  if (dir[ip]) {
    showToast("Esse código já está em uso. Escolha outro.");
    btn.disabled = false; btn.textContent = "Entrar na rede";
    return;
  }
  dir[ip] = { username, avatar: state.onboardingAvatar || null, lastSeen: Date.now() };
  await storageSet("directory", dir, true);
  const id = { ip, username, avatar: state.onboardingAvatar || null };
  await storageSet("myIdentity", id, false);
  state.identity = id;
  state.directory = dir;
  showToast("Perfil criado!");
  mountShell();
  startLiveLoops();
}

async function onOnboardingAvatarSelected(file) {
  const data = await resizeImage(file, 240, 0.7);
  state.onboardingAvatar = data;
  const usernameVal = document.getElementById("onb-username-input")?.value || "?";
  const prev = document.getElementById("onb-avatar-preview");
  if (prev) prev.innerHTML = avatar(usernameVal, data, 80);
}

/* ============================== add / contacts ============================== */

async function addContact() {
  const input = document.getElementById("add-ip-input");
  const ip = input.value;
  if (!isValidIp(ip)) return showToast("Digite um código de 6 dígitos.");
  if (ip === state.identity.ip) return showToast("Esse é o seu próprio código.");
  if (state.contacts.includes(ip)) return showToast("Você já adicionou esse contato.");
  const dir = (await storageGet("directory", true)) || {};
  if (!dir[ip]) return showToast("Nenhum perfil encontrado com esse código.");
  state.contacts = [...state.contacts, ip];
  await storageSet("myContacts", state.contacts, false);
  state.directory = dir;
  input.value = "";
  showToast(`${dir[ip].username} adicionado!`);
  renderContent();
}

function removeContact(ip) {
  showDialog({
    title: "Remover contato",
    message: "Isso remove o contato da sua lista. As conversas continuam guardadas.",
    confirmLabel: "Remover",
    onConfirm: async () => {
      state.contacts = state.contacts.filter((c) => c !== ip);
      await storageSet("myContacts", state.contacts, false);
      hideDialog();
      renderContent();
      showToast("Contato removido.");
    },
  });
}

async function copyIp(btn) {
  try {
    await navigator.clipboard.writeText(state.identity.ip);
    if (btn) { btn.innerHTML = icon("check", 20); setTimeout(() => { btn.innerHTML = icon("copy", 20); }, 1500); }
    showToast("Código copiado!");
  } catch {
    showToast("Não foi possível copiar.");
  }
}

/* ============================== status ============================== */

async function loadStatusFeed() {
  const ips = [state.identity.ip, ...state.contacts];
  const all = [];
  for (const ip of ips) {
    const arr = (await storageGet("status:" + ip, true)) || [];
    arr.forEach((s) => all.push({ ...s, owner: ip }));
  }
  all.sort((a, b) => b.timestamp - a.timestamp);
  state.statusFeed = all;
}

function openStatusComposer(type) {
  state.statusComposerType = state.statusComposerType === type ? null : type;
  renderContent();
}
function closeStatusComposer() {
  state.statusComposerType = null;
  renderContent();
}

async function postStatus(type, content, caption) {
  const key = "status:" + state.identity.ip;
  const arr = (await storageGet(key, true)) || [];
  arr.push({ id: genId(), type, content, caption: caption || "", timestamp: Date.now() });
  const ok = await storageSet(key, arr, true);
  state.statusComposerType = null;
  if (!ok) { showToast("Falha ao publicar: arquivo muito grande."); renderContent(); return; }
  showToast("Status publicado!");
  await loadStatusFeed();
  renderContent();
}

function publishStatusText() {
  const ta = document.getElementById("status-text-input");
  const text = (ta?.value || "").trim();
  if (!text) return;
  postStatus("text", text);
}

async function onStatusPhotoSelected(file) {
  try {
    const data = await resizeImage(file, 900, 0.75);
    await postStatus("image", data, "");
  } catch {
    showToast("Não foi possível ler essa imagem.");
  }
}
async function onStatusMusicSelected(file) {
  try {
    const captionInput = document.getElementById("status-music-caption");
    const caption = (captionInput && captionInput.value.trim()) || file.name;
    const data = await fileToDataURL(file);
    await postStatus("music", data, caption);
  } catch {
    showToast("Não foi possível ler esse áudio.");
  }
}

function deleteStatus(id) {
  showDialog({
    title: "Excluir status",
    message: "Essa publicação será removida para sempre.",
    onConfirm: async () => {
      const key = "status:" + state.identity.ip;
      const arr = ((await storageGet(key, true)) || []).filter((s) => s.id !== id);
      await storageSet(key, arr, true);
      hideDialog();
      await loadStatusFeed();
      renderContent();
      showToast("Status excluído.");
    },
  });
}

async function toggleHidden(ip) {
  state.hidden = state.hidden.includes(ip) ? state.hidden.filter((h) => h !== ip) : [...state.hidden, ip];
  await storageSet("myHidden", state.hidden, false);
}

/* ============================== conversations ============================== */

async function loadConversationPreviews() {
  const next = {};
  for (const ip of state.contacts) {
    const arr = (await storageGet("conv:" + convKey(state.identity.ip, ip), true)) || [];
    next[ip] = arr.length ? arr[arr.length - 1] : null;
  }
  state.convPreviews = next;
}

function deleteConversation(ip) {
  showDialog({
    title: "Excluir conversa",
    message: "Todo o histórico de mensagens com esse contato será apagado.",
    onConfirm: async () => {
      const key = "conv:" + convKey(state.identity.ip, ip);
      await storageDelete(key, true);
      if (state.activeChat === ip) { state.activeChat = null; state.messages = []; document.getElementById("composer-wrap").innerHTML = ""; }
      hideDialog();
      if (TABS[state.tabIndex].id === "conversations") await loadConversationPreviews();
      renderHeader();
      renderContent();
      showToast("Conversa excluída.");
    },
  });
}

/* ============================== chat ============================== */

async function sendMessage(type, content, fileName) {
  if (!state.activeChat) return;
  const key = "conv:" + convKey(state.identity.ip, state.activeChat);
  const arr = (await storageGet(key, true)) || [];
  arr.push({ id: genId(), sender: state.identity.ip, type, content, fileName: fileName || null, timestamp: Date.now() });
  const ok = await storageSet(key, arr, true);
  if (!ok) { showToast("Falha ao enviar: armazenamento cheio. Tente um arquivo menor."); return; }
  state.lastCounts[key] = arr.length;
  state.messages = arr;
  renderContent();
  scrollMessagesToBottom();
}

function sendTextFromInput() {
  const input = document.getElementById("chat-text-input");
  const val = (input?.value || "").trim();
  if (!val) return;
  input.value = "";
  sendMessage("text", val);
}

function deleteMessage(id) {
  showDialog({
    title: "Apagar mensagem",
    message: "Essa mensagem será apagada da conversa.",
    onConfirm: async () => {
      const key = "conv:" + convKey(state.identity.ip, state.activeChat);
      const arr = ((await storageGet(key, true)) || []).filter((m) => m.id !== id);
      await storageSet(key, arr, true);
      state.messages = arr;
      state.lastCounts[key] = arr.length;
      hideDialog();
      renderContent();
    },
  });
}

async function handleAttach(file) {
  if (!file) return;
  let type = "file";
  if (file.type.startsWith("image/")) type = "image";
  else if (file.type.startsWith("video/")) type = "video";
  else if (file.type.startsWith("audio/")) type = "audio";
  try {
    const data = type === "image" ? await resizeImage(file, 900, 0.75) : await fileToDataURL(file);
    await sendMessage(type, data, file.name);
  } catch {
    showToast("Não foi possível ler esse arquivo.");
  }
}

async function toggleRecording() {
  const micBtn = document.getElementById("mic-btn");
  if (state.recording) { state.mediaRecorder?.stop(); return; }
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    const rec = new MediaRecorder(stream);
    state.chunks = [];
    rec.ondataavailable = (e) => state.chunks.push(e.data);
    rec.onstop = async () => {
      const blob = new Blob(state.chunks, { type: "audio/webm" });
      const reader = new FileReader();
      reader.onload = async (e) => { await sendMessage("audio", e.target.result, "audio.webm"); };
      reader.readAsDataURL(blob);
      stream.getTracks().forEach((t) => t.stop());
      state.recording = false;
      if (micBtn) { micBtn.classList.remove("recording"); micBtn.innerHTML = icon("mic", 20); }
    };
    state.mediaRecorder = rec;
    rec.start();
    state.recording = true;
    if (micBtn) { micBtn.classList.add("recording"); micBtn.innerHTML = icon("square", 20); }
  } catch {
    showToast("Microfone indisponível aqui. Anexe um arquivo de áudio.");
  }
}

/* ============================== settings ============================== */

async function onSettingsAvatarSelected(file) {
  const data = await resizeImage(file, 240, 0.7);
  state.settingsAvatar = data;
  const usernameVal = document.getElementById("settings-username-input")?.value || state.identity.username;
  const prev = document.getElementById("settings-avatar-preview");
  if (prev) prev.innerHTML = avatar(usernameVal, data, 64);
}

async function saveProfile() {
  const usernameInput = document.getElementById("settings-username-input");
  const username = (usernameInput?.value || "").trim().slice(0, 20) || state.identity.username;
  const avatarData = state.settingsAvatar !== undefined ? state.settingsAvatar : state.identity.avatar;
  await updateProfile(username, avatarData);
}
async function updateProfile(username, avatarData) {
  state.identity = { ...state.identity, username, avatar: avatarData };
  await storageSet("myIdentity", state.identity, false);
  const dir = (await storageGet("directory", true)) || {};
  dir[state.identity.ip] = { ...(dir[state.identity.ip] || {}), username, avatar: avatarData, lastSeen: Date.now() };
  await storageSet("directory", dir, true);
  state.directory = dir;
  renderHeader();
  renderContent();
  showToast("Perfil atualizado!");
}

async function downloadBackup() {
  const convos = {};
  for (const ip of state.contacts) {
    const k = convKey(state.identity.ip, ip);
    convos[k] = (await storageGet("conv:" + k, true)) || [];
  }
  const myStatuses = (await storageGet("status:" + state.identity.ip, true)) || [];
  const payload = { identity: state.identity, contacts: state.contacts, hidden: state.hidden, statuses: myStatuses, conversations: convos, exportedAt: Date.now() };
  const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = `backup-${state.identity.ip}.json`;
  a.click();
  URL.revokeObjectURL(url);
  showToast("Backup baixado.");
}

async function restoreBackup(file) {
  try {
    const text = await file.text();
    const data = JSON.parse(text);
    if (data.contacts) { state.contacts = data.contacts; await storageSet("myContacts", state.contacts, false); }
    if (data.hidden) { state.hidden = data.hidden; await storageSet("myHidden", state.hidden, false); }
    showToast("Backup restaurado.");
    renderContent();
  } catch {
    showToast("Arquivo de backup inválido.");
  }
}

async function requestNotifications() {
  if (typeof Notification === "undefined") return showToast("Notificações não são suportadas aqui.");
  const perm = await Notification.requestPermission();
  state.notifPerm = perm;
  renderContent();
  showToast(perm === "granted" ? "Notificações ativadas." : "Permissão não concedida.");
}

function clearMyDataConfirm() {
  showDialog({
    title: "Apagar todos os meus dados",
    message: "Isso apaga seu perfil, contatos e preferências deste dispositivo. Não pode ser desfeito.",
    confirmLabel: "Apagar",
    onConfirm: async () => {
      await storageDelete("myIdentity", false);
      await storageDelete("myContacts", false);
      await storageDelete("myHidden", false);
      stopLiveLoops();
      state.identity = null; state.contacts = []; state.hidden = [];
      state.activeChat = null; state.tabIndex = 0; state.messages = [];
      state.statusFeed = []; state.convPreviews = {}; state.settingsAvatar = undefined;
      hideDialog();
      mountOnboarding();
      showToast("Dados apagados.");
    },
  });
}

/* ============================== live loops (heartbeat / polling) ============================== */

function startLiveLoops() {
  heartbeat();
  heartbeatTimer = setInterval(heartbeat, 12000);
  dirPollTimer = setInterval(pollDirectory, 6000);
  chatPollTimer = setInterval(pollConversations, 5000);
}
function stopLiveLoops() {
  clearInterval(heartbeatTimer); clearInterval(dirPollTimer); clearInterval(chatPollTimer);
}

async function heartbeat() {
  if (!state.identity) return;
  const dir = (await storageGet("directory", true)) || {};
  dir[state.identity.ip] = { ...(dir[state.identity.ip] || {}), username: state.identity.username, avatar: state.identity.avatar, lastSeen: Date.now() };
  await storageSet("directory", dir, true);
  state.directory = dir;
  renderHeader();
}
async function pollDirectory() {
  if (!state.identity) return;
  const dir = await storageGet("directory", true);
  if (dir) { state.directory = dir; renderHeader(); }
}
async function pollConversations() {
  if (!state.identity) return;
  for (const ip of state.contacts) {
    const key = "conv:" + convKey(state.identity.ip, ip);
    const arr = (await storageGet(key, true)) || [];
    const prev = state.lastCounts[key] ?? arr.length;
    if (arr.length > prev) {
      const last = arr[arr.length - 1];
      if (last.sender !== state.identity.ip && state.activeChat !== ip) {
        const name = (state.directory[ip] && state.directory[ip].username) || ip;
        if (document.hidden && state.notifPerm === "granted" && typeof Notification !== "undefined") {
          try { new Notification(name, { body: last.type === "text" ? last.content : `enviou um(a) ${last.type}` }); } catch {}
        } else {
          showToast(`Nova mensagem de ${name}`);
        }
      }
      if (state.activeChat === ip) { state.messages = arr; renderContent(); scrollMessagesToBottom(); }
    }
    state.lastCounts[key] = arr.length;
  }
}

/* ============================== event delegation ============================== */

document.body.addEventListener("click", async (e) => {
  const el = e.target.closest("[data-action]");
  if (!el) return;
  const action = el.dataset.action;
  switch (action) {
    case "nav-next": navNext(); break;
    case "nav-prev": navPrev(); break;
    case "goto-tab": setTab(parseInt(el.dataset.index, 10)); break;
    case "copy-ip": await copyIp(el); break;
    case "add-contact": await addContact(); break;
    case "remove-contact": removeContact(el.dataset.ip); break;
    case "open-chat": await openChat(el.dataset.ip); break;
    case "close-chat": closeChat(); break;
    case "delete-conversation": deleteConversation(el.dataset.ip); break;
    case "delete-message": deleteMessage(el.dataset.id); break;
    case "send-text": sendTextFromInput(); break;
    case "send-sticker":
      await sendMessage("sticker", el.dataset.emoji);
      document.getElementById("sticker-panel")?.classList.add("hidden");
      break;
    case "toggle-stickers": document.getElementById("sticker-panel")?.classList.toggle("hidden"); break;
    case "pick-chat-file": document.getElementById("chat-file-input")?.click(); break;
    case "toggle-record": await toggleRecording(); break;
    case "open-status-composer": openStatusComposer(el.dataset.type); break;
    case "pick-status-photo": document.getElementById("status-photo-input")?.click(); break;
    case "pick-status-music": document.getElementById("status-music-input")?.click(); break;
    case "cancel-status-composer": closeStatusComposer(); break;
    case "publish-status-text": publishStatusText(); break;
    case "delete-status": deleteStatus(el.dataset.id); break;
    case "hide-status-owner": await toggleHidden(el.dataset.ip); await loadStatusFeed(); renderContent(); break;
    case "pick-avatar": document.getElementById("avatar-input")?.click(); break;
    case "pick-onboarding-avatar": document.getElementById("onb-avatar-input")?.click(); break;
    case "regenerate-ip": { const i = document.getElementById("onb-ip-input"); if (i) i.value = genIp(); break; }
    case "submit-onboarding": await submitOnboarding(); break;
    case "save-profile": await saveProfile(); break;
    case "toggle-hidden-contact": await toggleHidden(el.dataset.ip); renderContent(); break;
    case "request-notif": await requestNotifications(); break;
    case "download-backup": await downloadBackup(); break;
    case "pick-backup-file": document.getElementById("backup-input")?.click(); break;
    case "clear-data": clearMyDataConfirm(); break;
    case "dialog-confirm": if (currentDialogConfirm) await currentDialogConfirm(); break;
    case "dialog-cancel": hideDialog(); break;
  }
});

document.body.addEventListener("change", async (e) => {
  const t = e.target;
  if (t.id === "chat-file-input") { const f = t.files[0]; t.value = ""; if (f) await handleAttach(f); }
  else if (t.id === "status-photo-input") { const f = t.files[0]; t.value = ""; if (f) await onStatusPhotoSelected(f); }
  else if (t.id === "status-music-input") { const f = t.files[0]; t.value = ""; if (f) await onStatusMusicSelected(f); }
  else if (t.id === "avatar-input") { const f = t.files[0]; t.value = ""; if (f) await onSettingsAvatarSelected(f); }
  else if (t.id === "onb-avatar-input") { const f = t.files[0]; t.value = ""; if (f) await onOnboardingAvatarSelected(f); }
  else if (t.id === "backup-input") { const f = t.files[0]; t.value = ""; if (f) await restoreBackup(f); }
});

document.body.addEventListener("keydown", (e) => {
  if (e.key !== "Enter") return;
  const id = e.target.id;
  if (id === "add-ip-input") { e.preventDefault(); addContact(); }
  else if (id === "chat-text-input") { e.preventDefault(); sendTextFromInput(); }
  else if (id === "onb-username-input" || id === "onb-ip-input") { e.preventDefault(); submitOnboarding(); }
});

document.body.addEventListener("input", (e) => {
  if (e.target.dataset && e.target.dataset.role === "digits") {
    e.target.value = e.target.value.replace(/\D/g, "").slice(0, 6);
  }
});

/* ============================== init ============================== */

async function init() {
  const [id, c, h, dir] = await Promise.all([
    storageGet("myIdentity", false),
    storageGet("myContacts", false),
    storageGet("myHidden", false),
    storageGet("directory", true),
  ]);
  state.identity = id;
  state.contacts = c || [];
  state.hidden = h || [];
  state.directory = dir || {};
  if (state.identity) { mountShell(); startLiveLoops(); }
  else { mountOnboarding(); }
}
init();

if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("sw.js").catch(() => {});
  });
}
</script>
